<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Bracket — Football 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f4f1;
    --text: #222;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  canvas { display: block; cursor: pointer; }

  #hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(0,0,0,0.25);
    font: 500 11px/1 system-ui, sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Tap a flag to trace its path to the final</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let S, CX, CY, SCALE;

function resize() {
  const side = Math.min(window.innerWidth, window.innerHeight);
  S = Math.max(side, 700);
  canvas.width = S * DPR;
  canvas.height = S * DPR;
  canvas.style.width = S + 'px';
  canvas.style.height = S + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  CX = S / 2; CY = S / 2;
  SCALE = S / 900;
}

const bracketOrder = [74,77,73,75, 83,84,81,82, 76,78,79,80, 86,88,85,87];

const matches = {
  74:{home:'Germany',away:'Paraguay',sH:1,sA:1,result:'PEN',pkH:3,pkA:4},
  77:{home:'France',away:'Sweden',sH:3,sA:0},
  73:{home:'South Africa',away:'Canada',sH:0,sA:1},
  75:{home:'Netherlands',away:'Morocco',sH:1,sA:1,result:'PEN',pkH:3,pkA:4},
  83:{home:'Portugal',away:'Croatia'},
  84:{home:'Spain',away:'Austria'},
  81:{home:'USA',away:'Bosnia and Herzegovina'},
  82:{home:'Belgium',away:'Senegal'},
  76:{home:'Brazil',away:'Japan',sH:2,sA:1},
  78:{home:'Côte d\'Ivoire',away:'Norway',sH:1,sA:2},
  79:{home:'Mexico',away:'Ecuador',sH:2,sA:0},
  80:{home:'England',away:'Congo DR'},
  86:{home:'Argentina',away:'Cabo Verde'},
  88:{home:'Australia',away:'Egypt'},
  85:{home:'Switzerland',away:'Algeria'},
  87:{home:'Colombia',away:'Ghana'},
  89:{home:'Paraguay',away:'France'},
  90:{home:'Canada',away:'Morocco'},
  91:{home:'Brazil',away:'Norway'},
  92:{home:'Mexico',away:'TBD'},
  93:{home:'TBD',away:'TBD'},94:{home:'TBD',away:'TBD'},
  95:{home:'TBD',away:'TBD'},96:{home:'TBD',away:'TBD'},
  97:{home:'TBD',away:'TBD'},98:{home:'TBD',away:'TBD'},
  99:{home:'TBD',away:'TBD'},100:{home:'TBD',away:'TBD'},
  101:{home:'TBD',away:'TBD'},102:{home:'TBD',away:'TBD'},
  104:{home:'TBD',away:'TBD'},
};

const r16Order = [89,90,93,94,91,92,95,96];
const qfOrder = [97,98,99,100];
const sfOrder = [101,102];

const codes = {
  'Algeria':'ALG','Argentina':'ARG','Australia':'AUS','Austria':'AUT',
  'Belgium':'BEL','Bosnia and Herzegovina':'BIH','Brazil':'BRA',
  'Cabo Verde':'CPV','Canada':'CAN','Colombia':'COL','Congo DR':'COD',
  'Croatia':'CRO','Curaçao':'CUW','Côte d\'Ivoire':'CIV','Czechia':'CZE',
  'Ecuador':'ECU','Egypt':'EGY','England':'ENG','France':'FRA',
  'Germany':'GER','Ghana':'GHA','Haiti':'HAI','IR Iran':'IRN',
  'Iraq':'IRQ','Japan':'JPN','Jordan':'JOR','Korea Republic':'KOR',
  'Mexico':'MEX','Morocco':'MAR','Netherlands':'NED','New Zealand':'NZL',
  'Norway':'NOR','Panama':'PAN','Paraguay':'PAR','Portugal':'POR',
  'Qatar':'QAT','Saudi Arabia':'KSA','Scotland':'SCO','Senegal':'SEN',
  'South Africa':'RSA','Spain':'ESP','Sweden':'SWE','Switzerland':'SUI',
  'Tunisia':'TUN','Türkiye':'TUR','USA':'USA','Uruguay':'URU','Uzbekistan':'UZB',
};

const primaryColors = {
  'Algeria':'#00882a','Argentina':'#74b8ed','Australia':'#003078','Austria':'#cc0000',
  'Belgium':'#cc0000','Bosnia and Herzegovina':'#002688','Brazil':'#008c33',
  'Cabo Verde':'#003488','Canada':'#cc0000','Colombia':'#ffc700','Congo DR':'#0066cc',
  'Croatia':'#cc0000','Côte d\'Ivoire':'#ff8000','Czechia':'#cc0000',
  'Ecuador':'#004da8','Egypt':'#cc0000','England':'#cc0000',
  'France':'#002688','Germany':'#cc0000','Ghana':'#cc2828',
  'Japan':'#cc0000','Mexico':'#006434','Morocco':'#cc0000',
  'Netherlands':'#ff6600','Norway':'#cc0000','Paraguay':'#cc0000',
  'Portugal':'#006834','Saudi Arabia':'#006b2e','Scotland':'#002688',
  'Senegal':'#006b2e','South Africa':'#006b2e','Spain':'#cc0000',
  'Sweden':'#005a9c','Switzerland':'#cc0000','USA':'#002670',
  'Uruguay':'#4d80cc','Uzbekistan':'#0066b3',
};

function matchWinner(m) {
  if (m.sH == null || m.sA == null) return null;
  if (m.result === 'PEN') {
    if (m.pkH != null && m.pkA != null) return m.pkH > m.pkA ? m.home : m.away;
    return null;
  }
  if (m.sH > m.sA) return m.home;
  if (m.sA > m.sH) return m.away;
  return null;
}

function isReal(t) { return t && t !== 'TBD' && !t.startsWith('To be'); }

const flagImages = {};
let flagsLoaded = 0;

function loadFlags() {
  const allTeams = new Set();
  for (const m of Object.values(matches)) {
    if (isReal(m.home)) allTeams.add(m.home);
    if (isReal(m.away)) allTeams.add(m.away);
  }
  const total = allTeams.size;
  for (const team of allTeams) {
    const code = codes[team] || team.substring(0,3).toUpperCase();
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { flagImages[team] = img; flagsLoaded++; if (flagsLoaded >= total) draw(); };
    img.onerror = () => { flagsLoaded++; if (flagsLoaded >= total) draw(); };
    img.src = `https://img.uefa.com/imgml/flags/140x140/${code}.png`;
  }
}

let selectedTeams = new Set();

function polar(r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}

function drawLine(from, to, color, width) {
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x, to.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function teamColor(team) {
  if (!team) return 'rgba(0,0,0,0.06)';
  return primaryColors[team] || '#888';
}

function draw() {
  ctx.clearRect(0, 0, S, S);

  const rR32 = 400*SCALE, rR16 = 295*SCALE, rQF = 210*SCALE, rSF = 145*SCALE;
  const nR32 = 22*SCALE, nR16 = 18*SCALE, nQF = 16*SCALE, nSF = 14*SCALE;
  const ps32 = 11, ps16 = 8, psQF = 14, psSF = 16;

  const undecided = 'rgba(0,0,0,0.06)';
  const undecidedW = 1.5;
  const decidedW = 3 * SCALE;

  // Ring bands
  const bands = [
    [0, rSF - 8*SCALE, 'rgba(180,145,42,0.04)'],
    [rSF - 8*SCALE, (rSF+rQF)/2, 'rgba(100,140,200,0.07)'],
    [(rSF+rQF)/2, (rQF+rR16)/2, 'rgba(0,0,0,0.02)'],
    [(rQF+rR16)/2, (rR16+rR32)/2, 'rgba(100,140,200,0.07)'],
    [(rR16+rR32)/2, rR32+34*SCALE, 'rgba(0,0,0,0.02)'],
  ];
  for (const [inner, outer, fill] of bands) {
    ctx.beginPath();
    ctx.arc(CX, CY, outer, 0, Math.PI*2);
    ctx.arc(CX, CY, inner, 0, Math.PI*2, true);
    ctx.fillStyle = fill;
    ctx.fill();
  }
  for (const r of [rR16, rQF, rSF]) {
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Center glow
  const glowR = 110*SCALE;
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, glowR);
  grad.addColorStop(0, 'rgba(180,145,42,0.12)');
  grad.addColorStop(0.5, 'rgba(180,145,42,0.03)');
  grad.addColorStop(1, 'rgba(180,145,42,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(CX, CY, glowR, 0, Math.PI*2);
  ctx.fill();

  const r32A = Array.from({length:16}, (_,i) => i*360/16);
  const r16A = Array.from({length:8}, (_,i) => (r32A[i*2]+r32A[i*2+1])/2);
  const qfA = Array.from({length:4}, (_,i) => (r16A[i*2]+r16A[i*2+1])/2);
  const sfA = Array.from({length:2}, (_,i) => (qfA[i*2]+qfA[i*2+1])/2);

  // R32 spokes
  const r32Junctions = [];
  const r32Winners = [];
  for (let i = 0; i < 16; i++) {
    const base = r32A[i];
    const hp = polar(rR32, base - ps32/2);
    const ap = polar(rR32, base + ps32/2);
    const jp = polar(rR32 - 38*SCALE, base);
    const m = matches[bracketOrder[i]];
    const winner = m ? matchWinner(m) : null;
    r32Winners.push(winner);
    if (winner) {
      const wc = teamColor(winner);
      const homeWon = winner === m.home;
      drawLine(homeWon ? hp : ap, jp, wc, decidedW);
      drawLine(homeWon ? ap : hp, jp, 'rgba(0,0,0,0.04)', 1);
    } else {
      drawLine(hp, jp, undecided, undecidedW);
      drawLine(ap, jp, undecided, undecidedW);
    }
    r32Junctions.push(jp);
  }

  // R32→R16
  const r16HP = [], r16AP = [], r16Junc = [];
  for (let i = 0; i < 8; i++) {
    const base = r16A[i];
    const hp = polar(rR16, base - ps16/2);
    const ap = polar(rR16, base + ps16/2);
    const jp = polar(rR16 - 30*SCALE, base);
    const w1 = r32Winners[i*2], w2 = r32Winners[i*2+1];
    drawLine(r32Junctions[i*2], hp, w1 ? teamColor(w1) : undecided, w1 ? decidedW : undecidedW);
    drawLine(r32Junctions[i*2+1], ap, w2 ? teamColor(w2) : undecided, w2 ? decidedW : undecidedW);

    const r16m = matches[r16Order[i]];
    const r16w = r16m ? matchWinner(r16m) : null;
    if (r16w) {
      const wc = teamColor(r16w);
      const homeWon = r16w === r16m.home;
      drawLine(homeWon ? hp : ap, jp, wc, decidedW);
      drawLine(homeWon ? ap : hp, jp, 'rgba(0,0,0,0.04)', 1);
    } else {
      drawLine(hp, jp, undecided, undecidedW);
      drawLine(ap, jp, undecided, undecidedW);
    }
    r16HP.push(hp); r16AP.push(ap); r16Junc.push(jp);
  }

  const r16Winners = r16Order.map(n => { const m = matches[n]; return m ? matchWinner(m) : null; });

  // R16→QF
  const qfHP = [], qfAP = [], qfJunc = [];
  for (let i = 0; i < 4; i++) {
    const base = qfA[i];
    const hp = polar(rQF, base - psQF/2);
    const ap = polar(rQF, base + psQF/2);
    const jp = polar(rQF - 24*SCALE, base);
    const w1 = r16Winners[i*2], w2 = r16Winners[i*2+1];
    drawLine(r16Junc[i*2], hp, w1 ? teamColor(w1) : undecided, w1 ? decidedW : undecidedW);
    drawLine(r16Junc[i*2+1], ap, w2 ? teamColor(w2) : undecided, w2 ? decidedW : undecidedW);
    drawLine(hp, jp, undecided, undecidedW);
    drawLine(ap, jp, undecided, undecidedW);
    qfHP.push(hp); qfAP.push(ap); qfJunc.push(jp);
  }

  // QF→SF
  const sfHP = [], sfAP = [], sfJunc = [];
  for (let i = 0; i < 2; i++) {
    const base = sfA[i];
    const hp = polar(rSF, base - psSF/2);
    const ap = polar(rSF, base + psSF/2);
    const jp = polar(rSF - 20*SCALE, base);
    drawLine(qfJunc[i*2], hp, undecided, undecidedW);
    drawLine(qfJunc[i*2+1], ap, undecided, undecidedW);
    drawLine(hp, jp, undecided, undecidedW);
    drawLine(ap, jp, undecided, undecidedW);
    sfHP.push(hp); sfAP.push(ap); sfJunc.push(jp);
  }

  // SF→Final
  for (const jp of sfJunc) {
    drawLine(jp, {x:CX,y:CY}, 'rgba(180,145,42,0.1)', undecidedW);
  }

  // Junction dots
  function drawJunction(pt) {
    const r = 3*SCALE;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();
  }

  // Draw nodes
  function drawTeamNode(pt, team, radius, state) {
    if (!isReal(team)) { drawEmpty(pt, radius); return; }
    ctx.save();
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI*2);
    ctx.clip();

    if (flagImages[team]) {
      ctx.drawImage(flagImages[team], pt.x - radius, pt.y - radius, radius*2, radius*2);
    } else {
      ctx.fillStyle = '#bbb';
      ctx.fillRect(pt.x - radius, pt.y - radius, radius*2, radius*2);
    }

    if (state === 'eliminated') {
      ctx.fillStyle = 'rgba(245,244,241,0.55)';
      ctx.fillRect(pt.x - radius, pt.y - radius, radius*2, radius*2);
    }
    ctx.restore();

    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI*2);
    if (state === 'winner') {
      ctx.strokeStyle = '#b5912a';
      ctx.lineWidth = 3;
    } else if (state === 'eliminated') {
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1.5;
    }
    ctx.stroke();

    if (selectedTeams.has(team)) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, radius + 4*SCALE, 0, Math.PI*2);
      ctx.strokeStyle = teamColor(team);
      ctx.lineWidth = 3*SCALE;
      ctx.stroke();
    }

    if (!flagImages[team]) {
      const code = codes[team] || team.substring(0,3).toUpperCase();
      const fontSize = radius * 0.75;
      ctx.font = `900 ${fontSize}px system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(0,0,0,${state==='eliminated'?0.3:0.6})`;
      ctx.fillText(code, pt.x+0.8, pt.y+0.8);
      ctx.fillStyle = `rgba(255,255,255,${state==='eliminated'?0.4:0.9})`;
      ctx.fillText(code, pt.x, pt.y);
    }
  }

  function drawEmpty(pt, radius) {
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI*2);
    ctx.setLineDash([3,3]);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawScore(pt, m) {
    let label = `${m.sH}–${m.sA}`;
    if (m.pkH != null) label += ` (${m.pkH}–${m.pkA} PK)`;
    ctx.font = `700 ${8*SCALE}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillText(label, pt.x, pt.y);
  }

  // R32 nodes
  for (let i = 0; i < 16; i++) {
    const base = r32A[i];
    const hp = polar(rR32, base - ps32/2);
    const ap = polar(rR32, base + ps32/2);
    const m = matches[bracketOrder[i]];
    if (!m) continue;
    const winner = matchWinner(m);
    const homeWon = winner === m.home;
    const awayWon = winner === m.away;
    drawTeamNode(hp, m.home, nR32, homeWon ? 'winner' : (awayWon ? 'eliminated' : 'normal'));
    drawTeamNode(ap, m.away, nR32, awayWon ? 'winner' : (homeWon ? 'eliminated' : 'normal'));
    drawJunction(r32Junctions[i]);
    if (m.sH != null) drawScore(polar(rR32 - 20*SCALE, base), m);
  }

  // R16 nodes
  for (let i = 0; i < 8; i++) {
    const t1 = r32Winners[i*2], t2 = r32Winners[i*2+1];
    if (t1) drawTeamNode(r16HP[i], t1, nR16, 'normal');
    else drawEmpty(r16HP[i], nR16);
    if (t2) drawTeamNode(r16AP[i], t2, nR16, 'normal');
    else drawEmpty(r16AP[i], nR16);
    drawJunction(r16Junc[i]);
  }

  // QF nodes
  for (let i = 0; i < 4; i++) {
    const m = matches[qfOrder[i]];
    if (m && isReal(m.home)) drawTeamNode(qfHP[i], m.home, nQF, 'normal');
    else drawEmpty(qfHP[i], nQF);
    if (m && isReal(m.away)) drawTeamNode(qfAP[i], m.away, nQF, 'normal');
    else drawEmpty(qfAP[i], nQF);
    drawJunction(qfJunc[i]);
  }

  // SF nodes
  for (let i = 0; i < 2; i++) {
    drawEmpty(sfHP[i], nSF);
    drawEmpty(sfAP[i], nSF);
    drawJunction(sfJunc[i]);
  }

  // Trophy
  ctx.font = `${36*SCALE}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F3C6}', CX, CY - 4*SCALE);
  ctx.font = `900 ${9*SCALE}px system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(160,125,30,0.5)';
  ctx.fillText('FINAL', CX, CY + 24*SCALE);

  // Curved labels
  function drawCurved(text, radius, centerDeg, spacing, fontSize, top) {
    const chars = text.split('');
    const totalSpan = (chars.length - 1) * spacing;
    ctx.font = `900 ${fontSize}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let i = 0; i < chars.length; i++) {
      let deg = top
        ? centerDeg - totalSpan/2 + i*spacing
        : centerDeg + totalSpan/2 - i*spacing;
      const rad = (deg - 90) * Math.PI / 180;
      const x = CX + radius * Math.cos(rad);
      const y = CY + radius * Math.sin(rad);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rad + (top ? Math.PI/2 : -Math.PI/2));
      ctx.fillText(chars[i], 0, 0);
      ctx.restore();
    }
  }

  const labelR32 = ((rR16+rR32)/2 + rR32+34*SCALE) / 2;
  const labelR16 = ((rQF+rR16)/2 + (rR16+rR32)/2) / 2;
  const labelQF = ((rSF+rQF)/2 + (rQF+rR16)/2) / 2;
  const labelSF = (rSF-8*SCALE + (rSF+rQF)/2) / 2;
  drawCurved('ROUND OF 32', labelR32, 0, 5, 17*SCALE, true);
  drawCurved('ROUND OF 32', labelR32, 180, 5, 17*SCALE, false);
  drawCurved('ROUND OF 16', labelR16, 0, 6, 15*SCALE, true);
  drawCurved('ROUND OF 16', labelR16, 180, 6, 15*SCALE, false);
  drawCurved('QUARTER-FINALS', labelQF, 0, 4.5, 12*SCALE, true);
  drawCurved('QUARTER-FINALS', labelQF, 180, 4.5, 12*SCALE, false);
  drawCurved('SEMI-FINALS', labelSF, 0, 6, 10*SCALE, true);
  drawCurved('SEMI-FINALS', labelSF, 180, 6, 10*SCALE, false);

  // Highlight paths for selected teams
  if (selectedTeams.size > 0) {
    const teamSlots = {};
    for (let i = 0; i < 16; i++) {
      const m = matches[bracketOrder[i]];
      if (m) { teamSlots[m.home] = i*2; teamSlots[m.away] = i*2+1; }
    }
    const hColors = ['#ff7300','#00bfff','#ff2888','#4df233'];
    let idx = 0;
    for (const team of selectedTeams) {
      const slot = teamSlots[team];
      if (slot == null) continue;
      const hc = hColors[idx % hColors.length]; idx++;
      const r32Idx = Math.floor(slot/2);
      const r32Home = slot % 2 === 0;
      const pts = [];
      const b32 = r32A[r32Idx];
      pts.push(polar(rR32, b32 + (r32Home ? -ps32/2 : ps32/2)));
      pts.push(polar(rR32-38*SCALE, b32));
      const r16Idx = Math.floor(r32Idx/2);
      const r16Home = r32Idx % 2 === 0;
      const b16 = r16A[r16Idx];
      pts.push(polar(rR16, b16 + (r16Home ? -ps16/2 : ps16/2)));
      pts.push(polar(rR16-30*SCALE, b16));
      const qfIdx2 = Math.floor(r16Idx/2);
      const qfHome = r16Idx % 2 === 0;
      const bqf = qfA[qfIdx2];
      pts.push(polar(rQF, bqf + (qfHome ? -psQF/2 : psQF/2)));
      pts.push(polar(rQF-24*SCALE, bqf));
      const sfIdx = Math.floor(qfIdx2/2);
      const sfHome = qfIdx2 % 2 === 0;
      const bsf = sfA[sfIdx];
      pts.push(polar(rSF, bsf + (sfHome ? -psSF/2 : psSF/2)));
      pts.push(polar(rSF-20*SCALE, bsf));
      pts.push({x:CX,y:CY});

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let j = 1; j < pts.length; j++) ctx.lineTo(pts[j].x, pts[j].y);
      ctx.strokeStyle = hc + '30';
      ctx.lineWidth = 14*SCALE;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.strokeStyle = hc + 'cc';
      ctx.lineWidth = 4.5*SCALE;
      ctx.stroke();

      const nodeR = [nR32, nR16, nQF, nSF];
      for (let j = 0; j < 4; j++) {
        const pt = pts[j*2];
        const r = nodeR[j] + 5*SCALE;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r, 0, Math.PI*2);
        ctx.strokeStyle = hc;
        ctx.lineWidth = 3*SCALE;
        ctx.stroke();
      }
    }
  }
}

// Tap handling
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rR32 = 400*SCALE, rR16 = 295*SCALE;
  const nR32 = 22*SCALE, nR16 = 18*SCALE;
  const ps32 = 11, ps16 = 8;
  const r32A = Array.from({length:16}, (_,i) => i*360/16);
  const r16A = Array.from({length:8}, (_,i) => (r32A[i*2]+r32A[i*2+1])/2);

  const pad = 14;
  let best = null, bestD = Infinity;
  function dist(p) { return Math.sqrt((x-p.x)**2 + (y-p.y)**2); }

  for (let i = 0; i < 16; i++) {
    const m = matches[bracketOrder[i]];
    if (!m) continue;
    const b = r32A[i];
    let d = dist(polar(rR32, b - ps32/2));
    if (d < nR32+pad && d < bestD) { bestD = d; best = m.home; }
    d = dist(polar(rR32, b + ps32/2));
    if (d < nR32+pad && d < bestD) { bestD = d; best = m.away; }
  }
  for (let i = 0; i < 8; i++) {
    const w1 = matchWinner(matches[bracketOrder[i*2]]);
    const w2 = matchWinner(matches[bracketOrder[i*2+1]]);
    const b = r16A[i];
    if (w1) { let d = dist(polar(rR16, b-ps16/2)); if (d < nR16+pad && d < bestD) { bestD=d; best=w1; } }
    if (w2) { let d = dist(polar(rR16, b+ps16/2)); if (d < nR16+pad && d < bestD) { bestD=d; best=w2; } }
  }

  if (best && isReal(best)) {
    if (selectedTeams.has(best)) selectedTeams.delete(best);
    else selectedTeams.add(best);
    draw();
  }
});

window.addEventListener('resize', () => { resize(); draw(); });
resize();
loadFlags();
setTimeout(draw, 100);
</script>
