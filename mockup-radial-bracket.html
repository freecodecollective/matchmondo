<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket — Football 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f4f1;
    font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: auto;
  }
  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c'), ctx = C.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let W, H;

const bracketOrder = [74,77,73,75, 83,84,81,82, 76,78,79,80, 86,88,85,87];
const r16Order = [89,90,93,94, 91,92,95,96];
const qfOrder = [97,98,99,100], sfOrder = [101,102];

const M = {
  74:{h:'Germany',a:'Paraguay',sH:1,sA:1,r:'PEN',pH:3,pA:4},
  77:{h:'France',a:'Sweden',sH:3,sA:0},
  73:{h:'South Africa',a:'Canada',sH:0,sA:1},
  75:{h:'Netherlands',a:'Morocco',sH:1,sA:1,r:'PEN',pH:3,pA:4},
  83:{h:'Portugal',a:'Croatia'},84:{h:'Spain',a:'Austria'},
  81:{h:'USA',a:'Bosnia and Herzegovina'},82:{h:'Belgium',a:'Senegal'},
  76:{h:'Brazil',a:'Japan',sH:2,sA:1},
  78:{h:"Côte d'Ivoire",a:'Norway',sH:1,sA:2},
  79:{h:'Mexico',a:'Ecuador',sH:2,sA:0},
  80:{h:'England',a:'Congo DR'},
  86:{h:'Argentina',a:'Cabo Verde'},88:{h:'Australia',a:'Egypt'},
  85:{h:'Switzerland',a:'Algeria'},87:{h:'Colombia',a:'Ghana'},
  89:{h:'Paraguay',a:'France'},90:{h:'Canada',a:'Morocco'},
  91:{h:'Brazil',a:'Norway'},92:{h:'Mexico',a:'TBD'},
  93:{h:'TBD',a:'TBD'},94:{h:'TBD',a:'TBD'},
  95:{h:'TBD',a:'TBD'},96:{h:'TBD',a:'TBD'},
  97:{h:'TBD',a:'TBD'},98:{h:'TBD',a:'TBD'},
  99:{h:'TBD',a:'TBD'},100:{h:'TBD',a:'TBD'},
  101:{h:'TBD',a:'TBD'},102:{h:'TBD',a:'TBD'},
  104:{h:'TBD',a:'TBD'},
};

const codes = {
  'Algeria':'ALG','Argentina':'ARG','Australia':'AUS','Austria':'AUT',
  'Belgium':'BEL','Bosnia and Herzegovina':'BIH','Brazil':'BRA',
  'Cabo Verde':'CPV','Canada':'CAN','Colombia':'COL','Congo DR':'COD',
  'Croatia':'CRO',"Côte d'Ivoire":'CIV','Czechia':'CZE',
  'Ecuador':'ECU','Egypt':'EGY','England':'ENG','France':'FRA',
  'Germany':'GER','Ghana':'GHA','Japan':'JPN','Mexico':'MEX',
  'Morocco':'MAR','Netherlands':'NED','Norway':'NOR','Paraguay':'PAR',
  'Portugal':'POR','Saudi Arabia':'KSA','Scotland':'SCO','Senegal':'SEN',
  'South Africa':'RSA','Spain':'ESP','Sweden':'SWE','Switzerland':'SUI',
  'USA':'USA','Uruguay':'URU',
};

const pc = {
  'Algeria':'#00882a','Argentina':'#74b8ed','Australia':'#003078','Austria':'#cc0000',
  'Belgium':'#cc0000','Bosnia and Herzegovina':'#002688','Brazil':'#008c33',
  'Cabo Verde':'#003488','Canada':'#cc0000','Colombia':'#ffc700','Congo DR':'#0066cc',
  'Croatia':'#cc0000',"Côte d'Ivoire":'#ff8000','Ecuador':'#004da8',
  'Egypt':'#cc0000','England':'#cc0000','France':'#002688','Germany':'#cc0000',
  'Ghana':'#cc2828','Japan':'#cc0000','Mexico':'#006434','Morocco':'#cc0000',
  'Netherlands':'#ff6600','Norway':'#cc0000','Paraguay':'#cc0000',
  'Portugal':'#006834','Saudi Arabia':'#006b2e','Scotland':'#002688',
  'Senegal':'#006b2e','South Africa':'#006b2e','Spain':'#cc0000',
  'Sweden':'#005a9c','Switzerland':'#cc0000','USA':'#002670',
};

function winner(m) {
  if (!m || m.sH == null) return null;
  if (m.r === 'PEN') return m.pH > m.pA ? m.h : m.a;
  return m.sH > m.sA ? m.h : (m.sA > m.sH ? m.a : null);
}
function isR(t) { return t && t !== 'TBD'; }

const flagImg = {};
let flagN = 0;
function loadFlags() {
  const teams = new Set();
  for (const v of Object.values(M)) { if (isR(v.h)) teams.add(v.h); if (isR(v.a)) teams.add(v.a); }
  const total = teams.size;
  for (const t of teams) {
    const c = codes[t] || t.substring(0,3).toUpperCase();
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => { flagImg[t] = img; if (++flagN >= total) draw(); };
    img.onerror = () => { if (++flagN >= total) draw(); };
    img.src = `https://img.uefa.com/imgml/flags/140x140/${c}.png`;
  }
}

let selected = null;

function resize() {
  W = Math.max(window.innerWidth, 900);
  H = Math.max(window.innerHeight, 700);
  C.width = W * DPR; C.height = H * DPR;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f5f4f1'; ctx.fillRect(0, 0, W, H);

  const nr = 16; // node radius
  const topM = 50, botM = 40;
  const usableH = H - topM - botM;
  const teamSpacing = usableH / 16; // 16 teams per side

  // Column x positions
  const gap = W * 0.08; // gap between columns
  const sideW = (W - gap) / 2;
  const colW = sideW / 5; // 5 zones: teams, bracket, R16, bracket, QF... but let's be precise

  // Left side columns
  const lTeam = 90;
  const lBrk1 = lTeam + 70;
  const lR16 = lBrk1 + 60;
  const lBrk2 = lR16 + 60;
  const lQF = lBrk2 + 50;
  const lBrk3 = lQF + 50;
  const lSF = lBrk3 + 40;

  // Right side (mirrored)
  const rTeam = W - 90;
  const rBrk1 = rTeam - 70;
  const rR16 = rBrk1 - 60;
  const rBrk2 = rR16 - 60;
  const rQF = rBrk2 - 50;
  const rBrk3 = rQF - 50;
  const rSF = rBrk3 - 40;

  const cx = W / 2;

  // Vertical positions for left side teams (16 teams, 8 pairs)
  const lY = [];
  for (let i = 0; i < 16; i++) lY.push(topM + (i + 0.5) * teamSpacing);

  // R32 pair midpoints
  const lR32mid = [];
  for (let i = 0; i < 8; i++) lR32mid.push((lY[i*2] + lY[i*2+1]) / 2);

  // R16 pair midpoints
  const lR16mid = [];
  for (let i = 0; i < 4; i++) lR16mid.push((lR32mid[i*2] + lR32mid[i*2+1]) / 2);

  // QF pair midpoints
  const lQFmid = [];
  for (let i = 0; i < 2; i++) lQFmid.push((lR16mid[i*2] + lR16mid[i*2+1]) / 2);

  // SF midpoint
  const lSFmid = (lQFmid[0] + lQFmid[1]) / 2;

  // Right side (same y positions)
  const rY = lY.slice();
  const rR32mid = lR32mid.slice();
  const rR16mid = lR16mid.slice();
  const rQFmid = lQFmid.slice();
  const rSFmid = lSFmid;

  const neu = 'rgba(0,0,0,0.08)';
  const neuW = 1.5;
  const decW = 3;

  // === BRACKET LINES ===
  function hLine(x1, x2, y, color, w) {
    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y);
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }
  function vLine(x, y1, y2, color, w) {
    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2);
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }

  function bracketPair(teamX, brkX, nextX, y1, y2, midY, w, color, loserColor, homeWon, decided, side) {
    const dir = side === 'left' ? 1 : -1;
    if (decided) {
      // Loser horizontal
      const loserY = homeWon ? y2 : y1;
      const winnerY = homeWon ? y1 : y2;
      hLine(teamX + dir*nr, brkX, loserY, loserColor, 1);
      // Winner horizontal
      hLine(teamX + dir*nr, brkX, winnerY, color, w);
      // Vertical connector
      vLine(brkX, y1, y2, color, w);
      // Arm to next round
      hLine(brkX, nextX - dir*nr, midY, color, w);
    } else {
      hLine(teamX + dir*nr, brkX, y1, neu, neuW);
      hLine(teamX + dir*nr, brkX, y2, neu, neuW);
      vLine(brkX, y1, y2, neu, neuW);
      hLine(brkX, nextX, midY, neu, neuW);
    }
  }

  // --- Left side R32 ---
  const r32w = [];
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i]];
    const w = m ? winner(m) : null;
    r32w.push(w);
    const y1 = lY[i*2], y2 = lY[i*2+1];
    const mid = lR32mid[i];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(lTeam, lBrk1, lR16, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'left');
    } else {
      bracketPair(lTeam, lBrk1, lR16, y1, y2, mid, neuW, neu, neu, false, false, 'left');
    }
  }

  // --- Left side R16 ---
  const r16w = [];
  for (let j = 0; j < 4; j++) {
    const m = M[r16Order[j]];
    const w = m ? winner(m) : null;
    r16w.push(w);
    const y1 = lR32mid[j*2], y2 = lR32mid[j*2+1];
    const mid = lR16mid[j];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(lR16, lBrk2, lQF, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'left');
    } else {
      bracketPair(lR16, lBrk2, lQF, y1, y2, mid, neuW, neu, neu, false, false, 'left');
    }
  }

  // --- Left side QF ---
  for (let k = 0; k < 2; k++) {
    const m = M[qfOrder[k]];
    const w = m ? winner(m) : null;
    const y1 = lR16mid[k*2], y2 = lR16mid[k*2+1];
    const mid = lQFmid[k];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(lQF, lBrk3, lSF, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'left');
    } else {
      bracketPair(lQF, lBrk3, lSF, y1, y2, mid, neuW, neu, neu, false, false, 'left');
    }
  }

  // --- Left side SF ---
  {
    const m = M[sfOrder[0]];
    const w = m ? winner(m) : null;
    const y1 = lQFmid[0], y2 = lQFmid[1];
    const mid = lSFmid;
    if (w) {
      const wc = pc[w] || '#888';
      hLine(lSF + nr, cx, mid, wc, decW);
    } else {
      hLine(lSF, cx, mid, 'rgba(180,145,42,0.1)', neuW);
    }
  }

  // --- Right side R32 ---
  const r32wr = [];
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i+8]];
    const w = m ? winner(m) : null;
    r32wr.push(w);
    const y1 = rY[i*2], y2 = rY[i*2+1];
    const mid = rR32mid[i];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(rTeam, rBrk1, rR16, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'right');
    } else {
      bracketPair(rTeam, rBrk1, rR16, y1, y2, mid, neuW, neu, neu, false, false, 'right');
    }
  }

  // --- Right side R16 ---
  const r16wr = [];
  for (let j = 0; j < 4; j++) {
    const m = M[r16Order[j+4]];
    const w = m ? winner(m) : null;
    r16wr.push(w);
    const y1 = rR32mid[j*2], y2 = rR32mid[j*2+1];
    const mid = rR16mid[j];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(rR16, rBrk2, rQF, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'right');
    } else {
      bracketPair(rR16, rBrk2, rQF, y1, y2, mid, neuW, neu, neu, false, false, 'right');
    }
  }

  // --- Right side QF ---
  for (let k = 0; k < 2; k++) {
    const m = M[qfOrder[k+2]];
    const w = m ? winner(m) : null;
    const y1 = rR16mid[k*2], y2 = rR16mid[k*2+1];
    const mid = rQFmid[k];
    if (w) {
      const wc = pc[w] || '#888';
      bracketPair(rQF, rBrk3, rSF, y1, y2, mid, decW, wc, 'rgba(0,0,0,0.04)', w===m.h, true, 'right');
    } else {
      bracketPair(rQF, rBrk3, rSF, y1, y2, mid, neuW, neu, neu, false, false, 'right');
    }
  }

  // --- Right side SF ---
  {
    const m = M[sfOrder[1]];
    const w = m ? winner(m) : null;
    const y1 = rQFmid[0], y2 = rQFmid[1];
    const mid = rSFmid;
    if (w) {
      const wc = pc[w] || '#888';
      hLine(rSF - nr, cx, mid, wc, decW);
    } else {
      hLine(rSF, cx, mid, 'rgba(180,145,42,0.1)', neuW);
    }
  }

  // === NODES ===
  function drawNode(x, y, team, state) {
    if (!isR(team)) { drawEmpty(x, y); return; }
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, nr, 0, Math.PI*2); ctx.clip();
    if (flagImg[team]) {
      ctx.drawImage(flagImg[team], x-nr, y-nr, nr*2, nr*2);
    } else {
      ctx.fillStyle = pc[team] || '#bbb';
      ctx.fillRect(x-nr, y-nr, nr*2, nr*2);
    }
    if (state === 'elim') {
      ctx.fillStyle = 'rgba(245,244,241,0.55)';
      ctx.fillRect(x-nr, y-nr, nr*2, nr*2);
    }
    ctx.restore();
    ctx.beginPath(); ctx.arc(x, y, nr, 0, Math.PI*2);
    ctx.strokeStyle = state === 'win' ? '#b5912a' : (state === 'elim' ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.15)');
    ctx.lineWidth = state === 'win' ? 2.5 : 1; ctx.stroke();
    if (selected === team) {
      ctx.beginPath(); ctx.arc(x, y, nr+4, 0, Math.PI*2);
      ctx.strokeStyle = pc[team] || '#888'; ctx.lineWidth = 3; ctx.stroke();
    }
  }

  function drawEmpty(x, y) {
    ctx.beginPath(); ctx.arc(x, y, nr, 0, Math.PI*2);
    ctx.setLineDash([3,3]); ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
    ctx.stroke(); ctx.setLineDash([]);
  }

  function label(x, y, text, align) {
    ctx.font = '600 10px system-ui'; ctx.textAlign = align; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(text, x, y);
  }

  function score(x, y, m) {
    if (!m || m.sH == null) return;
    let s = `${m.sH}–${m.sA}`;
    if (m.pH != null) s += ` PK`;
    ctx.font = '700 8px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillText(s, x, y);
  }

  // Left R32 nodes
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i]];
    if (!m) continue;
    const w = winner(m);
    drawNode(lTeam, lY[i*2], m.h, w === m.h ? 'win' : (w === m.a ? 'elim' : ''));
    drawNode(lTeam, lY[i*2+1], m.a, w === m.a ? 'win' : (w === m.h ? 'elim' : ''));
    label(lTeam - nr - 6, lY[i*2], codes[m.h] || m.h.substring(0,3).toUpperCase(), 'right');
    label(lTeam - nr - 6, lY[i*2+1], codes[m.a] || m.a.substring(0,3).toUpperCase(), 'right');
    score(lTeam + 38, lR32mid[i], m);
  }

  // Left R16 nodes
  for (let j = 0; j < 4; j++) {
    const t1 = r32w[j*2], t2 = r32w[j*2+1];
    const r16m = M[r16Order[j]];
    const r16win = r16m ? winner(r16m) : null;
    if (t1) {
      drawNode(lR16, lR32mid[j*2], t1, r16win && r16win!==t1 ? 'elim' : (r16win===t1 ? 'win' : ''));
      label(lR16 - nr - 6, lR32mid[j*2], codes[t1] || '', 'right');
    } else drawEmpty(lR16, lR32mid[j*2]);
    if (t2) {
      drawNode(lR16, lR32mid[j*2+1], t2, r16win && r16win!==t2 ? 'elim' : (r16win===t2 ? 'win' : ''));
      label(lR16 - nr - 6, lR32mid[j*2+1], codes[t2] || '', 'right');
    } else drawEmpty(lR16, lR32mid[j*2+1]);
  }

  // Left QF nodes
  for (let k = 0; k < 2; k++) {
    const qfm = M[qfOrder[k]];
    const t1 = qfm && isR(qfm.h) ? qfm.h : null;
    const t2 = qfm && isR(qfm.a) ? qfm.a : null;
    if (t1) drawNode(lQF, lR16mid[k*2], t1, '');
    else drawEmpty(lQF, lR16mid[k*2]);
    if (t2) drawNode(lQF, lR16mid[k*2+1], t2, '');
    else drawEmpty(lQF, lR16mid[k*2+1]);
  }

  // Left SF nodes
  drawEmpty(lSF, lQFmid[0]);
  drawEmpty(lSF, lQFmid[1]);

  // Right R32 nodes
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i+8]];
    if (!m) continue;
    const w = winner(m);
    drawNode(rTeam, rY[i*2], m.h, w === m.h ? 'win' : (w === m.a ? 'elim' : ''));
    drawNode(rTeam, rY[i*2+1], m.a, w === m.a ? 'win' : (w === m.h ? 'elim' : ''));
    label(rTeam + nr + 6, rY[i*2], codes[m.h] || m.h.substring(0,3).toUpperCase(), 'left');
    label(rTeam + nr + 6, rY[i*2+1], codes[m.a] || m.a.substring(0,3).toUpperCase(), 'left');
    score(rTeam - 38, rR32mid[i], m);
  }

  // Right R16 nodes
  for (let j = 0; j < 4; j++) {
    const t1 = r32wr[j*2], t2 = r32wr[j*2+1];
    const r16m = M[r16Order[j+4]];
    const r16win = r16m ? winner(r16m) : null;
    if (t1) {
      drawNode(rR16, rR32mid[j*2], t1, r16win && r16win!==t1 ? 'elim' : (r16win===t1 ? 'win' : ''));
      label(rR16 + nr + 6, rR32mid[j*2], codes[t1] || '', 'left');
    } else drawEmpty(rR16, rR32mid[j*2]);
    if (t2) {
      drawNode(rR16, rR32mid[j*2+1], t2, r16win && r16win!==t2 ? 'elim' : (r16win===t2 ? 'win' : ''));
      label(rR16 + nr + 6, rR32mid[j*2+1], codes[t2] || '', 'left');
    } else drawEmpty(rR16, rR32mid[j*2+1]);
  }

  // Right QF nodes
  for (let k = 0; k < 2; k++) {
    const qfm = M[qfOrder[k+2]];
    const t1 = qfm && isR(qfm.h) ? qfm.h : null;
    const t2 = qfm && isR(qfm.a) ? qfm.a : null;
    if (t1) drawNode(rQF, rR16mid[k*2], t1, '');
    else drawEmpty(rQF, rR16mid[k*2]);
    if (t2) drawNode(rQF, rR16mid[k*2+1], t2, '');
    else drawEmpty(rQF, rR16mid[k*2+1]);
  }

  // Right SF nodes
  drawEmpty(rSF, rQFmid[0]);
  drawEmpty(rSF, rQFmid[1]);

  // Trophy at center
  const finalY = (lSFmid + rSFmid) / 2;
  ctx.font = '32px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F3C6}', cx, finalY - 4);
  ctx.font = '900 9px system-ui'; ctx.fillStyle = 'rgba(160,125,30,0.45)';
  ctx.fillText('FINAL', cx, finalY + 22);

  // Round labels
  ctx.font = '700 10px system-ui'; ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.textAlign = 'center';
  ctx.fillText('ROUND OF 32', lTeam, topM - 16);
  ctx.fillText('R16', lR16, topM - 16);
  ctx.fillText('QF', lQF, topM - 16);
  ctx.fillText('SF', lSF, topM - 16);
  ctx.fillText('ROUND OF 32', rTeam, topM - 16);
  ctx.fillText('R16', rR16, topM - 16);
  ctx.fillText('QF', rQF, topM - 16);
  ctx.fillText('SF', rSF, topM - 16);
}

// Click handler
C.addEventListener('click', (e) => {
  const rect = C.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const nr = 16;

  const topM = 50, botM = 40;
  const usableH = H - topM - botM;
  const teamSpacing = usableH / 16;
  const lTeam = 90, rTeam = W - 90;

  const lY = [];
  for (let i = 0; i < 16; i++) lY.push(topM + (i + 0.5) * teamSpacing);

  let best = null, bestD = Infinity;
  function d(px, py) { return Math.sqrt((x-px)**2 + (y-py)**2); }

  // Check R32 left
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i]]; if (!m) continue;
    let dd = d(lTeam, lY[i*2]);
    if (dd < nr+12 && dd < bestD) { bestD=dd; best=m.h; }
    dd = d(lTeam, lY[i*2+1]);
    if (dd < nr+12 && dd < bestD) { bestD=dd; best=m.a; }
  }
  // Check R32 right
  for (let i = 0; i < 8; i++) {
    const m = M[bracketOrder[i+8]]; if (!m) continue;
    let dd = d(rTeam, lY[i*2]);
    if (dd < nr+12 && dd < bestD) { bestD=dd; best=m.h; }
    dd = d(rTeam, lY[i*2+1]);
    if (dd < nr+12 && dd < bestD) { bestD=dd; best=m.a; }
  }

  if (best && isR(best)) {
    selected = (best === selected) ? null : best;
    draw();
  }
});

window.addEventListener('resize', () => { resize(); draw(); });
resize(); loadFlags();
setTimeout(draw, 100);
</script>
