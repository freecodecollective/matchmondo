<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Bracket — Football 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f4f1;
    font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  canvas { display: block; cursor: pointer; }
  #controls {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .tgl {
    padding: 6px 14px; border: none; border-radius: 16px;
    font: 600 11px/1 system-ui; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: #e8e6e0; color: #999;
    transition: all 0.15s;
  }
  .tgl.on { background: #333; color: #fff; }
  #hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(0,0,0,0.22); font: 500 11px/1 system-ui; letter-spacing: 0.06em;
    text-transform: uppercase; pointer-events: none;
  }
</style>
</head>
<body>
<div id="controls">
  <button class="tgl on" id="tglNames" onclick="toggleNames()">Names</button>
  <button class="tgl on" id="tglScores" onclick="toggleScores()">Scores</button>
</div>
<canvas id="c"></canvas>
<div id="hint">Tap a flag to trace its path to the final</div>
<script>
const C = document.getElementById('c'), ctx = C.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let W, H, cx, cy, R;
let showNames = true, showScores = true;
let selected = null;

const bracketOrder = [74,77,73,75, 83,84,81,82, 76,78,79,80, 86,88,85,87];
const r16Order = [89,90,93,94, 91,92,95,96];
const qfOrder = [97,98,99,100], sfOrder = [101,102];

const M = {
  74:{h:'Germany',a:'Paraguay',sH:1,sA:1,r:'PEN',pH:3,pA:4},
  77:{h:'France',a:'Sweden',sH:3,sA:0},
  73:{h:'South Africa',a:'Canada',sH:0,sA:1},
  75:{h:'Netherlands',a:'Morocco',sH:1,sA:1,r:'PEN',pH:2,pA:3},
  83:{h:'Portugal',a:'Croatia'},84:{h:'Spain',a:'Austria'},
  81:{h:'USA',a:'Bosnia and Herzegovina',sH:1,sA:0},
  82:{h:'Belgium',a:'Senegal',sH:3,sA:2,r:'AET'},
  76:{h:'Brazil',a:'Japan',sH:2,sA:1},
  78:{h:"Côte d'Ivoire",a:'Norway',sH:1,sA:2},
  79:{h:'Mexico',a:'Ecuador',sH:2,sA:0},
  80:{h:'England',a:'Congo DR',sH:2,sA:1},
  86:{h:'Argentina',a:'Cabo Verde'},88:{h:'Australia',a:'Egypt'},
  85:{h:'Switzerland',a:'Algeria'},87:{h:'Colombia',a:'Ghana'},
  89:{h:'Paraguay',a:'France'},90:{h:'Canada',a:'Morocco'},
  91:{h:'Brazil',a:'Norway'},92:{h:'Mexico',a:'England'},
  93:{h:'TBD',a:'TBD'},94:{h:'USA',a:'Belgium'},
  95:{h:'TBD',a:'TBD'},96:{h:'TBD',a:'TBD'},
  97:{h:'TBD',a:'TBD'},98:{h:'TBD',a:'TBD'},
  99:{h:'TBD',a:'TBD'},100:{h:'TBD',a:'TBD'},
  101:{h:'TBD',a:'TBD'},102:{h:'TBD',a:'TBD'},
};

const codes = {
  'Algeria':'ALG','Argentina':'ARG','Australia':'AUS','Austria':'AUT',
  'Belgium':'BEL','Bosnia and Herzegovina':'BIH','Brazil':'BRA',
  'Cabo Verde':'CPV','Canada':'CAN','Colombia':'COL','Congo DR':'COD',
  'Croatia':'CRO',"Côte d'Ivoire":'CIV','Czechia':'CZE',
  'Ecuador':'ECU','Egypt':'EGY','England':'ENG','France':'FRA',
  'Germany':'GER','Ghana':'GHA','Japan':'JPN','Mexico':'MEX',
  'Morocco':'MAR','Netherlands':'NED','Norway':'NOR','Paraguay':'PAR',
  'Portugal':'POR','Saudi Arabia':'KSA','Scotland':'SCO','Senegal':'SEN',
  'South Africa':'RSA','Spain':'ESP','Sweden':'SWE','Switzerland':'SUI',
  'USA':'USA','Uruguay':'URU',
};

const pc = {
  'Algeria':'#00882a','Argentina':'#74b8ed','Australia':'#003078','Austria':'#cc0000',
  'Belgium':'#cc0000','Bosnia and Herzegovina':'#002688','Brazil':'#008c33',
  'Cabo Verde':'#003488','Canada':'#cc0000','Colombia':'#ffc700','Congo DR':'#0066cc',
  'Croatia':'#cc0000',"Côte d'Ivoire":'#ff8000','Ecuador':'#004da8',
  'Egypt':'#cc0000','England':'#cc0000','France':'#002688','Germany':'#cc0000',
  'Ghana':'#cc2828','Japan':'#cc0000','Mexico':'#006434','Morocco':'#cc0000',
  'Netherlands':'#ff6600','Norway':'#cc0000','Paraguay':'#cc0000',
  'Portugal':'#006834','Saudi Arabia':'#006b2e','Scotland':'#002688',
  'Senegal':'#006b2e','South Africa':'#006b2e','Spain':'#cc0000',
  'Sweden':'#005a9c','Switzerland':'#cc0000','USA':'#002670',
};

// world championship counts — shown as jersey stars outside the flag
const STARS = {
  'Brazil':5,'Germany':4,'Argentina':3,'France':2,'Uruguay':2,'England':1,'Spain':1,
};

const shortName = (t) => t === 'Bosnia and Herzegovina' ? 'Bosnia' : t;

function winner(m) {
  if (!m || m.sH == null) return null;
  if (m.r === 'PEN') return m.pH > m.pA ? m.h : m.a;
  return m.sH > m.sA ? m.h : (m.sA > m.sH ? m.a : null);
}
function isR(t) { return t && t !== 'TBD'; }
function scoreText(m) {
  if (!m || m.sH == null) return null;
  let s = `${m.sH}–${m.sA}`;
  if (m.pH != null) s += ` (${m.pH}–${m.pA} PK)`;
  else if (m.r === 'AET') s += ' AET';
  return s;
}

const flagImg = {};
let flagN = 0;
function loadFlags() {
  const teams = new Set();
  for (const v of Object.values(M)) { if (isR(v.h)) teams.add(v.h); if (isR(v.a)) teams.add(v.a); }
  const total = teams.size;
  for (const t of teams) {
    const c = codes[t] || t.substring(0,3).toUpperCase();
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => { flagImg[t] = img; if (++flagN >= total) draw(); };
    img.onerror = () => { if (++flagN >= total) draw(); };
    img.src = `https://img.uefa.com/imgml/flags/140x140/${c}.png`;
  }
}

// 32 outer slots, starting at top, clockwise
function slotA(i) { return (-90 + (i + 0.5) * 11.25) * Math.PI / 180; }
function pt(a, r) { return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; }

function toggleNames() {
  showNames = !showNames;
  document.getElementById('tglNames').classList.toggle('on', showNames);
  draw();
}
function toggleScores() {
  showScores = !showScores;
  document.getElementById('tglScores').classList.toggle('on', showScores);
  draw();
}

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * DPR; C.height = H * DPR;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) / 2 - 28;
}

// text along an arc; flipped=true renders right-side-up at the bottom of the circle
function arcText(text, r, centerA, flipped, size, color) {
  ctx.font = `700 ${size}px system-ui`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const ls = size * 0.55;
  const chars = [...text];
  const widths = chars.map(ch => ctx.measureText(ch).width + ls);
  const totalA = (widths.reduce((a,b)=>a+b,0) - ls) / r;
  let a = flipped ? centerA + totalA/2 : centerA - totalA/2;
  for (let i = 0; i < chars.length; i++) {
    const halfA = (widths[i]/2) / r * (flipped ? -1 : 1);
    a += halfA;
    const [x, y] = pt(a, r);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(a + (flipped ? -Math.PI/2 : Math.PI/2));
    ctx.fillText(chars[i], 0, 0);
    ctx.restore();
    a += halfA;
  }
}

// 5-point star, rotated so one point aims along `rot`
function drawStar(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot + Math.PI / 2);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 === 0 ? r : r * 0.44;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const px = rr * Math.cos(a), py = rr * Math.sin(a);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = '#b5912a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f5f4f1'; ctx.fillRect(0, 0, W, H);

  // node rings centered in their band; chord rings between rounds
  const B0 = R * 1.005, B1 = R * 0.782, B2 = R * 0.5569, B3 = R * 0.3791, B4 = R * 0.2227;
  const rTeam = R * 0.8934, r16r = R * 0.6706, rQF = R * 0.4668, rSF = R * 0.301;
  const rC1 = R * 0.801, rC2 = R * 0.5758, rC3 = R * 0.3957, rC4 = R * 0.1611;
  const nr = Math.max(10, R * 0.0521);
  const nr16 = Math.max(9, R * 0.0427), nrQF = Math.max(8, R * 0.0379), nrSF = Math.max(7, R * 0.0332);
  const rStars = R * 0.955;

  // === ring bands — each round's nodes sit at the radial center of its band ===
  const bands = [
    [B0, '#e9e5d9'],  // group stage (sand)
    [B1, '#dfe7f3'],  // round of 16 (blue)
    [B2, '#eae6da'],  // quarter-finals (sand)
    [B3, '#dce5f1'],  // semi-finals (blue)
    [B4, '#efe9d3'],  // final (gold)
  ];
  for (const [br, col] of bands) {
    ctx.beginPath(); ctx.arc(cx, cy, br, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
  }
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.20);
  g.addColorStop(0, 'rgba(246,233,182,0.95)');
  g.addColorStop(1, 'rgba(246,233,182,0)');
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.20, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  for (const r of [B1, B2, B3, B4]) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1; ctx.stroke();
  }

  const neu = 'rgba(0,0,0,0.09)';
  const neuW = 1.5, decW = Math.max(2.5, R * 0.008);

  // ring angle helpers
  const pairMid = [];
  for (let i = 0; i < 16; i++) pairMid.push((slotA(i*2) + slotA(i*2+1)) / 2);
  const r16MatchA = [];
  for (let j = 0; j < 8; j++) r16MatchA.push((pairMid[j*2] + pairMid[j*2+1]) / 2);
  const qfMatchA = [];
  for (let k = 0; k < 4; k++) qfMatchA.push((r16MatchA[k*2] + r16MatchA[k*2+1]) / 2);
  const sfMatchA = [];
  for (let s = 0; s < 2; s++) sfMatchA.push((qfMatchA[s*2] + qfMatchA[s*2+1]) / 2);

  function line(x1, y1, x2, y2, color, w, alpha) {
    ctx.save();
    if (alpha != null) ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
    ctx.restore();
  }

  // boxy connector: radial stubs, straight chord, straight arm inward.
  // winner's color stops at the chord midpoint — the loser's side stays faint.
  function connector(a1, a2, rNode, nodeR, rChord, aNext, rNext, nextR, m, dim) {
    const w = winner(m);
    const alpha = dim ? 0.12 : 1;
    const [s1x, s1y] = pt(a1, rNode - nodeR), [c1x, c1y] = pt(a1, rChord);
    const [s2x, s2y] = pt(a2, rNode - nodeR), [c2x, c2y] = pt(a2, rChord);
    const mx = (c1x + c2x) / 2, my = (c1y + c2y) / 2;
    const [nx, ny] = pt(aNext, rNext + nextR);

    if (w) {
      const col = pc[w] || '#888';
      const homeWon = w === m.h;
      const wcx = homeWon ? c1x : c2x, wcy = homeWon ? c1y : c2y;
      const lcx = homeWon ? c2x : c1x, lcy = homeWon ? c2y : c1y;
      line(homeWon ? s2x : s1x, homeWon ? s2y : s1y, lcx, lcy, 'rgba(0,0,0,0.05)', 1.2, alpha);
      line(lcx, lcy, mx, my, 'rgba(0,0,0,0.05)', 1.2, alpha);
      line(homeWon ? s1x : s2x, homeWon ? s1y : s2y, wcx, wcy, col, decW, alpha);
      line(wcx, wcy, mx, my, col, decW, alpha);
      line(mx, my, nx, ny, col, decW, alpha);
    } else {
      line(s1x, s1y, c1x, c1y, neu, neuW, alpha);
      line(s2x, s2y, c2x, c2y, neu, neuW, alpha);
      line(c1x, c1y, c2x, c2y, neu, neuW, alpha);
      line(mx, my, nx, ny, neu, neuW, alpha);
    }
  }

  const dimFor = (m) => selected != null && !(m && (m.h === selected || m.a === selected));

  // R32 pair i → R16 slot at pairMid[i]
  for (let i = 0; i < 16; i++) {
    const m = M[bracketOrder[i]];
    connector(slotA(i*2), slotA(i*2+1), rTeam, nr, rC1, pairMid[i], r16r, nr16, m, dimFor(m));
  }
  // R16 match j → QF slot at r16MatchA[j]
  for (let j = 0; j < 8; j++) {
    const m = M[r16Order[j]];
    connector(pairMid[j*2], pairMid[j*2+1], r16r, nr16, rC2, r16MatchA[j], rQF, nrQF, m, dimFor(m));
  }
  // QF match k → SF slot at qfMatchA[k]
  for (let k = 0; k < 4; k++) {
    const m = M[qfOrder[k]];
    connector(r16MatchA[k*2], r16MatchA[k*2+1], rQF, nrQF, rC3, qfMatchA[k], rSF, nrSF, m, selected != null);
  }
  // SF match s → the final at center
  for (let s = 0; s < 2; s++) {
    const a1 = qfMatchA[s*2], a2 = qfMatchA[s*2+1];
    const [s1x, s1y] = pt(a1, rSF - nrSF), [c1x, c1y] = pt(a1, rC4);
    const [s2x, s2y] = pt(a2, rSF - nrSF), [c2x, c2y] = pt(a2, rC4);
    const mx = (c1x + c2x) / 2, my = (c1y + c2y) / 2;
    const [fx, fy] = pt(sfMatchA[s], R * 0.075);
    const alpha = selected != null ? 0.12 : 1;
    line(s1x, s1y, c1x, c1y, neu, neuW, alpha);
    line(s2x, s2y, c2x, c2y, neu, neuW, alpha);
    line(c1x, c1y, c2x, c2y, neu, neuW, alpha);
    line(mx, my, fx, fy, neu, neuW, alpha);
  }

  // === score labels (toggleable, next to the winner's stub) ===
  if (showScores) {
    function roundScore(m, aWin, aMid, rNode, nodeR, rChord) {
      const s = scoreText(m);
      if (!s) return;
      const rMid = rChord + (rNode - nodeR - rChord) * 0.28;
      let [x, y] = pt(aWin, rMid);
      const perp = aWin + (aWin < aMid ? -1 : 1) * Math.PI / 2;
      x += Math.cos(perp) * 16; y += Math.sin(perp) * 16;
      ctx.save();
      ctx.globalAlpha = dimFor(m) ? 0.1 : 1;
      ctx.font = `700 ${Math.max(8, R*0.021)}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillText(s, x, y);
      ctx.restore();
    }
    for (let i = 0; i < 16; i++) {
      const m = M[bracketOrder[i]];
      const w = winner(m);
      if (!w) continue;
      roundScore(m, w === m.h ? slotA(i*2) : slotA(i*2+1), pairMid[i], rTeam, nr, rC1);
    }
    for (let j = 0; j < 8; j++) {
      const m = M[r16Order[j]];
      const w = winner(m);
      if (!w) continue;
      roundScore(m, w === m.h ? pairMid[j*2] : pairMid[j*2+1], r16MatchA[j], r16r, nr16, rC2);
    }
    for (let k = 0; k < 4; k++) {
      const m = M[qfOrder[k]];
      const w = winner(m);
      if (!w) continue;
      roundScore(m, w === m.h ? r16MatchA[k*2] : r16MatchA[k*2+1], qfMatchA[k], rQF, nrQF, rC3);
    }
  }

  // === curved ring labels — inside their band, clear of the nodes ===
  const lblCol = 'rgba(0,0,0,0.32)';
  arcText('G R O U P   S T A G E', R * 0.985, -Math.PI/2, false, R * 0.030, lblCol);
  arcText('G R O U P   S T A G E', R * 0.985,  Math.PI/2, true,  R * 0.030, lblCol);
  arcText('R O U N D   O F   1 6', R * 0.7464, -Math.PI/2, false, R * 0.0355, lblCol);
  arcText('R O U N D   O F   1 6', R * 0.7464,  Math.PI/2, true,  R * 0.0355, lblCol);
  arcText('Q U A R T E R - F I N A L S', R * 0.5308, -Math.PI/2, false, R * 0.0284, lblCol);
  arcText('Q U A R T E R - F I N A L S', R * 0.5308,  Math.PI/2, true,  R * 0.0284, lblCol);
  arcText('S E M I - F I N A L S', R * 0.3555, -Math.PI/2, false, R * 0.0237, lblCol);
  arcText('S E M I - F I N A L S', R * 0.3555,  Math.PI/2, true,  R * 0.0237, lblCol);

  // === nodes ===
  function drawNode(a, r, team, nodeR, state, dim) {
    const [x, y] = pt(a, r);
    ctx.save();
    if (dim) ctx.globalAlpha = 0.35;
    if (!isR(team)) {
      ctx.beginPath(); ctx.arc(x, y, nodeR, 0, Math.PI*2);
      ctx.setLineDash([3,3]); ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
      ctx.stroke(); ctx.setLineDash([]);
      ctx.restore(); return;
    }
    ctx.beginPath(); ctx.arc(x, y, nodeR, 0, Math.PI*2);
    ctx.save(); ctx.clip();
    if (flagImg[team]) ctx.drawImage(flagImg[team], x-nodeR, y-nodeR, nodeR*2, nodeR*2);
    else { ctx.fillStyle = pc[team] || '#bbb'; ctx.fillRect(x-nodeR, y-nodeR, nodeR*2, nodeR*2); }
    if (state === 'elim') {
      ctx.fillStyle = 'rgba(238,236,230,0.62)';
      ctx.fillRect(x-nodeR, y-nodeR, nodeR*2, nodeR*2);
    }
    ctx.restore();
    ctx.beginPath(); ctx.arc(x, y, nodeR, 0, Math.PI*2);
    ctx.strokeStyle = state === 'win' ? '#b5912a' : (state === 'elim' ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.9)');
    ctx.lineWidth = state === 'win' ? 2.5 : 1.5; ctx.stroke();
    ctx.restore();
  }

  // name just inside the node, anchored so the text extends toward the center
  // (never back across the flag)
  function drawName(a, r, team, nodeR, dim) {
    if (!showNames || !isR(team)) return;
    const [x, y] = pt(a, r - nodeR - Math.max(4, R * 0.012));
    const ca = Math.cos(a), sa = Math.sin(a);
    ctx.save();
    if (dim) ctx.globalAlpha = 0.25;
    ctx.font = `700 ${Math.max(8, R * 0.0215)}px system-ui`;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    if (Math.abs(ca) > Math.abs(sa)) {
      // east/west node: text runs horizontally toward the center
      ctx.textAlign = ca > 0 ? 'right' : 'left';
      ctx.textBaseline = 'middle';
    } else {
      // north/south node: text sits below/above the flag, toward the center
      ctx.textAlign = 'center';
      ctx.textBaseline = sa > 0 ? 'bottom' : 'top';
    }
    ctx.fillText(shortName(team), x, y);
    ctx.restore();
  }

  // R32 team nodes + stars + names
  for (let i = 0; i < 16; i++) {
    const m = M[bracketOrder[i]];
    if (!m) continue;
    const w = winner(m);
    const dim = selected != null && m.h !== selected && m.a !== selected;
    for (const [slot, team] of [[i*2, m.h], [i*2+1, m.a]]) {
      const a = slotA(slot);
      const state = w === team ? 'win' : (w ? 'elim' : '');
      const nodeDim = dim && team !== selected;
      drawNode(a, rTeam, team, nr, state, nodeDim);
      // championship stars, arced outside the flag
      const nStars = STARS[team];
      if (nStars) {
        const starSize = Math.max(3.5, R * 0.0115);
        const step = (starSize * 2.4) / rStars;
        ctx.save();
        if (nodeDim) ctx.globalAlpha = 0.35;
        for (let si = 0; si < nStars; si++) {
          const sa = a + (si - (nStars - 1) / 2) * step;
          const [sx, sy] = pt(sa, rStars);
          drawStar(sx, sy, starSize, sa);
        }
        ctx.restore();
      }
      drawName(a, rTeam, team, nr, nodeDim);
    }
  }

  // R16 slot nodes (R32 pair winners)
  for (let i = 0; i < 16; i++) {
    const w = winner(M[bracketOrder[i]]);
    const r16m = M[r16Order[Math.floor(i / 2)]];
    const r16w = winner(r16m);
    const state = w && r16w ? (r16w === w ? 'win' : 'elim') : '';
    const dim = selected != null && w !== selected;
    drawNode(pairMid[i], r16r, w, nr16, state, dim);
    if (w) drawName(pairMid[i], r16r, w, nr16, dim);
  }
  // QF slot nodes (R16 winners)
  for (let j = 0; j < 8; j++) {
    const w = winner(M[r16Order[j]]);
    const dim = selected != null && w !== selected;
    drawNode(r16MatchA[j], rQF, w, nrQF, '', dim);
    if (w) drawName(r16MatchA[j], rQF, w, nrQF, dim);
  }
  // SF slot nodes (QF winners)
  for (let k = 0; k < 4; k++) {
    const w = winner(M[qfOrder[k]]);
    drawNode(qfMatchA[k], rSF, w, nrSF, '', selected != null && w !== selected);
    if (w) drawName(qfMatchA[k], rSF, w, nrSF, selected != null && w !== selected);
  }

  // === selected team: full path to the final in their flag color ===
  if (selected) {
    let slot = -1;
    for (let i = 0; i < 16 && slot < 0; i++) {
      const m = M[bracketOrder[i]];
      if (!m) continue;
      if (m.h === selected) slot = i * 2;
      else if (m.a === selected) slot = i * 2 + 1;
    }
    if (slot >= 0) {
      const col = pc[selected] || '#888';
      const pairIdx = slot >> 1, r16Idx = pairIdx >> 1, qfIdx = r16Idx >> 1, sfIdx = qfIdx >> 1;
      const mid = (p1, p2) => [(p1[0]+p2[0])/2, (p1[1]+p2[1])/2];
      const mid1 = mid(pt(slotA(pairIdx*2), rC1), pt(slotA(pairIdx*2+1), rC1));
      const mid2 = mid(pt(pairMid[r16Idx*2], rC2), pt(pairMid[r16Idx*2+1], rC2));
      const mid3 = mid(pt(r16MatchA[qfIdx*2], rC3), pt(r16MatchA[qfIdx*2+1], rC3));
      const mid4 = mid(pt(qfMatchA[sfIdx*2], rC4), pt(qfMatchA[sfIdx*2+1], rC4));
      const pts = [
        pt(slotA(slot), rTeam), pt(slotA(slot), rC1), mid1,
        pt(pairMid[pairIdx], r16r), pt(pairMid[pairIdx], rC2), mid2,
        pt(r16MatchA[r16Idx], rQF), pt(r16MatchA[r16Idx], rC3), mid3,
        pt(qfMatchA[qfIdx], rSF), pt(qfMatchA[qfIdx], rC4), mid4,
        [cx, cy],
      ];
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (const p of pts.slice(1)) ctx.lineTo(p[0], p[1]);
      ctx.strokeStyle = col; ctx.globalAlpha = 0.22;
      ctx.lineWidth = Math.max(9, R * 0.026); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.stroke();
      ctx.globalAlpha = 0.9;
      ctx.lineWidth = Math.max(3.5, R * 0.010);
      ctx.stroke();
      ctx.restore();
      // rings at the node positions along the path
      const ringR = [nr, nr16, nrQF, nrSF];
      for (let j = 0; j < 4; j++) {
        const p = pts[j * 3];
        ctx.beginPath(); ctx.arc(p[0], p[1], ringR[j] + 4, 0, Math.PI*2);
        ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.stroke();
      }
    }
  }

  // === center trophy ===
  ctx.save();
  ctx.font = `${Math.round(R*0.09)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F3C6}', cx, cy - R*0.012);
  ctx.font = `900 ${Math.max(8, R*0.026)}px system-ui`;
  ctx.fillStyle = 'rgba(160,125,30,0.5)';
  ctx.fillText('FINAL', cx, cy + R*0.062);
  ctx.restore();
}

C.addEventListener('click', (e) => {
  const rect = C.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const nr = Math.max(10, R * 0.0521);
  const rTeam = R * 0.8934;

  let best = null, bestD = Infinity;
  for (let i = 0; i < 16; i++) {
    const m = M[bracketOrder[i]];
    if (!m) continue;
    for (const [slot, team] of [[i*2, m.h], [i*2+1, m.a]]) {
      if (!isR(team)) continue;
      const [px, py] = pt(slotA(slot), rTeam);
      const d = Math.sqrt((x-px)**2 + (y-py)**2);
      if (d < nr + 10 && d < bestD) { bestD = d; best = team; }
    }
  }
  selected = (best === selected) ? null : best;
  draw();
});

window.addEventListener('resize', () => { resize(); draw(); });
resize(); loadFlags();
setTimeout(draw, 150);
</script>
</body>
</html>
