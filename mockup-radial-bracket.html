<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Bracket — Football 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f4f1;
    --canvas-bg: #eceae5;
    --gold: #b8942e;
    --gold-ring: #c9a84c;
    --text: #222;
    --text-dim: rgba(0,0,0,0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 28px 20px 4px;
    max-width: 600px;
  }
  .header h1 {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
  }
  .header p { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  .tabs {
    display: flex; gap: 2px; background: rgba(0,0,0,0.05);
    border-radius: 10px; padding: 3px; margin: 14px auto 6px;
  }
  .tab {
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: rgba(0,0,0,0.4); background: none; border: none;
    padding: 7px 16px; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab.active {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .tab:hover:not(.active) { color: rgba(0,0,0,0.6); }

  .version-label {
    font-size: 11px; color: var(--text-dim); text-align: center;
    margin: 2px 0 0; font-style: italic;
  }

  .canvas-wrap {
    width: 100%; max-width: 900px; aspect-ratio: 1;
    position: relative; margin: 0 auto; padding: 10px;
  }

  canvas {
    width: 100%; height: 100%; display: block;
    border-radius: 20px; background: var(--canvas-bg);
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  .legend {
    display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
    padding: 4px 20px 28px; font-size: 11px; color: var(--text-dim);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.won { border: 2px solid var(--gold-ring); background: #ddd; }
  .legend-dot.pending { background: rgba(0,0,0,0.03); border: 1.5px dashed rgba(0,0,0,0.15); }
  .legend-dot.out { background: rgba(0,0,0,0.04); border: 1.5px solid rgba(0,0,0,0.06); }
</style>
</head>
<body>

<div class="header">
  <h1>Knockout Bracket</h1>
  <p>Round of 32 through Final &middot; Decided matches show scores</p>
  <div class="tabs">
    <button class="tab active" data-mode="stripes">A &middot; Flag Stripes</button>
    <button class="tab" data-mode="emoji">B &middot; Flag Emoji</button>
    <button class="tab" data-mode="gradient">C &middot; Gradient</button>
  </div>
</div>
<div class="version-label" id="versionLabel">Accurate flag stripe patterns clipped to circles, country code overlay</div>

<div class="canvas-wrap">
  <canvas id="bracket"></canvas>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot won"></div> Advancing</div>
  <div class="legend-item"><div class="legend-dot pending"></div> TBD</div>
  <div class="legend-item"><div class="legend-dot out"></div> Eliminated</div>
</div>

// ── Drawing helpers ──

function polar(cx, cy, r, deg) {
  var rad = (deg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}

function drawLine(x1, y1, x2, y2, color, width) {
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = width || 1;
  ctx.stroke();
}

function drawJunction(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, 3 * s, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fill();
}

function drawEmptyNode(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.025)';
  ctx.fill();
  ctx.setLineDash([4, 5]);
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawScore(x, y, sh, sa, s) {
  ctx.font = '800 ' + (8*s) + 'px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(140,110,30,0.8)';
  ctx.fillText(sh + '–' + sa, x, y);
}

// ── Flag rendering ──

function drawFlagStripes(x, y, r, team) {
  var f = FLAGS[team];
  if (!f) { drawFlagGradient(x, y, r, team); return; }

  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();

  var d = r * 2, l = x - r, t = y - r;

  switch(f.t) {
    case 'h':
      ctx.fillStyle=f.c[0]; ctx.fillRect(l,t,d,d/3);
      ctx.fillStyle=f.c[1]; ctx.fillRect(l,t+d/3,d,d/3);
      ctx.fillStyle=f.c[2]; ctx.fillRect(l,t+2*d/3,d,d/3+1);
      break;
    case 'h2':
      ctx.fillStyle=f.c[0]; ctx.fillRect(l,t,d,d/2);
      ctx.fillStyle=f.c[1]; ctx.fillRect(l,t+d/2,d,d/2);
      break;
    case 'v':
      ctx.fillStyle=f.c[0]; ctx.fillRect(l,t,d/3,d);
      ctx.fillStyle=f.c[1]; ctx.fillRect(l+d/3,t,d/3,d);
      ctx.fillStyle=f.c[2]; ctx.fillRect(l+2*d/3,t,d/3+1,d);
      break;
    case 'v2':
      ctx.fillStyle=f.c[0]; ctx.fillRect(l,t,d/2,d);
      ctx.fillStyle=f.c[1]; ctx.fillRect(l+d/2,t,d/2,d);
      break;
    case 'solid':
      ctx.fillStyle=f.bg; ctx.fillRect(l,t,d,d);
      if(f.accent){ctx.fillStyle=f.accent;ctx.beginPath();ctx.arc(x,y,r*0.32,0,Math.PI*2);ctx.fill();}
      break;
    case 'japan':
      ctx.fillStyle=f.c[0];ctx.fillRect(l,t,d,d);
      ctx.fillStyle=f.c[1];ctx.beginPath();ctx.arc(x,y,r*0.38,0,Math.PI*2);ctx.fill();
      break;
    case 'czech':
      ctx.fillStyle='#fff';ctx.fillRect(l,t,d,d/2);
      ctx.fillStyle='#D7141A';ctx.fillRect(l,t+d/2,d,d/2);
      ctx.fillStyle='#11457E';ctx.beginPath();ctx.moveTo(l,t);ctx.lineTo(x,y);ctx.lineTo(l,t+d);ctx.fill();
      break;
    case 'canada':
      ctx.fillStyle='#FF0000';ctx.fillRect(l,t,d*0.25,d);
      ctx.fillStyle='#fff';ctx.fillRect(l+d*0.25,t,d*0.5,d);
      ctx.fillStyle='#FF0000';ctx.fillRect(l+d*0.75,t,d*0.25,d);
      ctx.fillStyle='#FF0000';ctx.beginPath();
      ctx.moveTo(x,y-r*0.32);ctx.lineTo(x+r*0.18,y);ctx.lineTo(x,y+r*0.32);ctx.lineTo(x-r*0.18,y);ctx.fill();
      break;
    case 'norway':
      ctx.fillStyle='#BA0C2F';ctx.fillRect(l,t,d,d);
      ctx.fillStyle='#fff';ctx.fillRect(l+d*0.28,t,d*0.18,d);ctx.fillRect(l,t+d*0.39,d,d*0.22);
      ctx.fillStyle='#00205B';ctx.fillRect(l+d*0.32,t,d*0.1,d);ctx.fillRect(l,t+d*0.43,d,d*0.14);
      break;
    case 'sweden':
      ctx.fillStyle='#006AA7';ctx.fillRect(l,t,d,d);
      ctx.fillStyle='#FECC02';ctx.fillRect(l+d*0.28,t,d*0.16,d);ctx.fillRect(l,t+d*0.4,d,d*0.2);
      break;
    case 'scotland':
      ctx.fillStyle='#005EB8';ctx.fillRect(l,t,d,d);
      ctx.strokeStyle='#fff';ctx.lineWidth=r*0.15;
      ctx.beginPath();ctx.moveTo(l,t);ctx.lineTo(l+d,t+d);ctx.stroke();
      ctx.beginPath();ctx.moveTo(l+d,t);ctx.lineTo(l,t+d);ctx.stroke();
      break;
    case 'england':
      ctx.fillStyle='#fff';ctx.fillRect(l,t,d,d);ctx.fillStyle='#CF081F';
      ctx.fillRect(l+d*0.43,t,d*0.14,d);ctx.fillRect(l,t+d*0.43,d,d*0.14);
      break;
    case 'usa':
      for(var s=0;s<13;s++){ctx.fillStyle=s%2===0?'#B22234':'#fff';ctx.fillRect(l,t+s*d/13,d,d/13+1);}
      ctx.fillStyle='#3C3B6E';ctx.fillRect(l,t,d*0.45,d*0.54);
      break;
    case 'uruguay':
      for(var s=0;s<9;s++){ctx.fillStyle=s%2===0?'#fff':'#001489';ctx.fillRect(l,t+s*d/9,d,d/9+1);}
      ctx.fillStyle='#fff';ctx.fillRect(l,t,d*0.4,d*0.56);
      ctx.fillStyle='#FCD116';ctx.beginPath();ctx.arc(l+d*0.2,t+d*0.28,r*0.16,0,Math.PI*2);ctx.fill();
      break;
    case 'spain':
      ctx.fillStyle='#AA151B';ctx.fillRect(l,t,d,d*0.25);
      ctx.fillStyle='#F1BF00';ctx.fillRect(l,t+d*0.25,d,d*0.5);
      ctx.fillStyle='#AA151B';ctx.fillRect(l,t+d*0.75,d,d*0.25);
      break;
    case 'portugal':
      ctx.fillStyle='#006600';ctx.fillRect(l,t,d*0.4,d);
      ctx.fillStyle='#FF0000';ctx.fillRect(l+d*0.4,t,d*0.6,d);
      ctx.fillStyle='#FFCC00';ctx.beginPath();ctx.arc(l+d*0.4,y,r*0.22,0,Math.PI*2);ctx.fill();
      break;
    case 'panama':
      ctx.fillStyle='#fff';ctx.fillRect(l,t,d,d);
      ctx.fillStyle='#DA121A';ctx.fillRect(l+d/2,t,d/2,d/2);
      ctx.fillStyle='#003DA5';ctx.fillRect(l,t+d/2,d/2,d/2);
      ctx.fillStyle='#003DA5';ctx.beginPath();ctx.arc(l+d*0.25,t+d*0.25,r*0.1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#DA121A';ctx.beginPath();ctx.arc(l+d*0.75,t+d*0.75,r*0.1,0,Math.PI*2);ctx.fill();
      break;
    case 'colombia':
      ctx.fillStyle='#FCD116';ctx.fillRect(l,t,d,d/2);
      ctx.fillStyle='#003893';ctx.fillRect(l,t+d/2,d,d/4);
      ctx.fillStyle='#CE1126';ctx.fillRect(l,t+d*0.75,d,d/4);
      break;
    case 'ecuador':
      ctx.fillStyle='#FFD100';ctx.fillRect(l,t,d,d/2);
      ctx.fillStyle='#034EA2';ctx.fillRect(l,t+d/2,d,d/4);
      ctx.fillStyle='#CE1126';ctx.fillRect(l,t+d*0.75,d,d/4);
      break;
    case 'brazil':
      ctx.fillStyle='#009B3A';ctx.fillRect(l,t,d,d);ctx.fillStyle='#FEDF00';
      ctx.beginPath();ctx.moveTo(x,t+d*0.12);ctx.lineTo(l+d*0.9,y);ctx.lineTo(x,t+d*0.88);ctx.lineTo(l+d*0.1,y);ctx.fill();
      ctx.fillStyle='#002776';ctx.beginPath();ctx.arc(x,y,r*0.28,0,Math.PI*2);ctx.fill();
      break;
    case 'turkey':
      ctx.fillStyle='#E30A17';ctx.fillRect(l,t,d,d);ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x-r*0.08,y,r*0.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#E30A17';ctx.beginPath();ctx.arc(x+r*0.03,y,r*0.22,0,Math.PI*2);ctx.fill();
      break;
    case 'jordan':
      ctx.fillStyle='#000';ctx.fillRect(l,t,d,d/3);
      ctx.fillStyle='#fff';ctx.fillRect(l,t+d/3,d,d/3);
      ctx.fillStyle='#007A3D';ctx.fillRect(l,t+2*d/3,d,d/3);
      ctx.fillStyle='#CE1126';ctx.beginPath();ctx.moveTo(l,t);ctx.lineTo(l+d*0.4,y);ctx.lineTo(l,t+d);ctx.fill();
      break;
    case 'congo':
      ctx.fillStyle='#007FFF';ctx.fillRect(l,t,d,d);
      ctx.strokeStyle='#FCD116';ctx.lineWidth=r*0.22;
      ctx.beginPath();ctx.moveTo(l,t+d);ctx.lineTo(l+d,t);ctx.stroke();
      ctx.strokeStyle='#CE1021';ctx.lineWidth=r*0.12;
      ctx.beginPath();ctx.moveTo(l,t+d*0.85);ctx.lineTo(l+d*0.85,t);ctx.stroke();
      break;
    case 'swiss':
      ctx.fillStyle='#FF0000';ctx.fillRect(l,t,d,d);ctx.fillStyle='#fff';
      ctx.fillRect(x-r*0.1,y-r*0.35,r*0.2,r*0.7);ctx.fillRect(x-r*0.35,y-r*0.1,r*0.7,r*0.2);
      break;
    case 'sa':
      ctx.fillStyle='#002395';ctx.fillRect(l,t,d,d/2);
      ctx.fillStyle='#DE3831';ctx.fillRect(l,t,d,d*0.17);
      ctx.fillStyle='#007A4D';ctx.fillRect(l,t+d*0.83,d,d*0.17);
      ctx.fillStyle='#FFB612';ctx.fillRect(l,t+d/2,d,d/2);
      ctx.fillStyle='#007A4D';ctx.beginPath();
      ctx.moveTo(l,t+d*0.2);ctx.lineTo(x-r*0.1,y);ctx.lineTo(l+d,y-d*0.15);
      ctx.lineTo(l+d,y+d*0.15);ctx.lineTo(x-r*0.1,y);ctx.lineTo(l,t+d*0.8);ctx.fill();
      break;
    case 'caboverde':
      ctx.fillStyle='#003893';ctx.fillRect(l,t,d,d);
      ctx.fillStyle='#fff';ctx.fillRect(l,t+d*0.6,d,d*0.04);
      ctx.fillStyle='#CF2027';ctx.fillRect(l,t+d*0.66,d,d*0.1);
      ctx.fillStyle='#fff';ctx.fillRect(l,t+d*0.78,d,d*0.04);
      break;
    default:
      ctx.fillStyle=f.bg||'#888';ctx.fillRect(l,t,d,d);
  }
  ctx.restore();
}

function drawFlagEmoji(x, y, r, team) {
  var emoji = EMOJI[team]; if(!emoji) return;
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#e8e6e1';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font=r*1.3+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,x,y+1);
  ctx.restore();
}

function drawFlagGradient(x, y, r, team) {
  var colors = GRAD_COLORS[team]||['#888','#aaa'];
  var grad = ctx.createLinearGradient(x-r,y-r,x+r,y+r);
  grad.addColorStop(0,colors[0]);grad.addColorStop(1,colors[1]);
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
}

function drawTeamNode(x, y, team, r, state, s) {
  ctx.save();
  if (state === 'eliminated') ctx.globalAlpha = 0.25;

  // Shadow for depth
  if (state !== 'eliminated') {
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 6 * s;
    ctx.shadowOffsetY = 2 * s;
  }

  if (currentMode === 'stripes') drawFlagStripes(x, y, r, team);
  else if (currentMode === 'emoji') drawFlagEmoji(x, y, r, team);
  else drawFlagGradient(x, y, r, team);

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Outer stroke — thicker, more visible
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  if (state === 'winner') {
    ctx.strokeStyle = '#b8942e'; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, r + 4*s, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(180,140,40,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  } else if (currentMode !== 'emoji') {
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Country code — bigger, bolder
  var code = CODES[team] || team.slice(0,3).toUpperCase();
  var fontSize = r * 0.75;

  if (currentMode === 'emoji') {
    ctx.font = '800 ' + (r*0.55) + 'px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = state === 'eliminated' ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.6)';
    ctx.fillText(code, x, y + r + r*0.6);
  } else {
    ctx.font = '900 ' + fontSize + 'px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Thicker outline for readability
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.strokeText(code, x, y);
    ctx.fillStyle = '#fff';
    ctx.fillText(code, x, y);
  }

  ctx.restore();
}

// ══════════════════════════════════════════════════════
// MAIN DRAW
// ══════════════════════════════════════════════════════

function draw() {
  var rect = canvas.parentElement.getBoundingClientRect();
  var size = Math.min(rect.width, rect.height);
  canvas.width = size * DPR;
  canvas.height = size * DPR;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, size, size);

  var CX = size/2, CY = size/2, s = size/900;

  // Radii — slightly more spread
  var R_R32 = 400*s, R_R16 = 295*s, R_QF = 210*s, R_SF = 145*s;

  // Node sizes — BIGGER for prominence
  var nR32 = 22*s, nR16 = 18*s, nQF = 16*s, nSF = 14*s;

  var pairSpan = 11; // degrees between home/away in a match

  // ── Alternating ring bands — full rings between rounds ──
  var bands = [
    { inner: 0,              outer: R_SF - 8*s,   fill: 'rgba(180,140,40,0.04)' },
    { inner: R_SF - 8*s,     outer: (R_SF+R_QF)/2, fill: 'rgba(0,0,0,0.04)' },
    { inner: (R_SF+R_QF)/2,  outer: (R_QF+R_R16)/2, fill: 'rgba(0,0,0,0.07)' },
    { inner: (R_QF+R_R16)/2, outer: (R_R16+R_R32)/2, fill: 'rgba(0,0,0,0.04)' },
    { inner: (R_R16+R_R32)/2, outer: R_R32 + 34*s, fill: 'rgba(0,0,0,0.07)' },
  ];
  bands.forEach(function(b) {
    ctx.beginPath();
    ctx.arc(CX, CY, b.outer, 0, Math.PI*2);
    ctx.arc(CX, CY, b.inner, 0, Math.PI*2, true);
    ctx.fillStyle = b.fill;
    ctx.fill();
  });

  // Ring lines
  [R_R16, R_QF, R_SF].forEach(function(r) {
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // Center glow
  var glow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 110*s);
  glow.addColorStop(0, 'rgba(180,140,40,0.12)');
  glow.addColorStop(0.6, 'rgba(180,140,40,0.03)');
  glow.addColorStop(1, 'rgba(180,140,40,0)');
  ctx.beginPath(); ctx.arc(CX, CY, 110*s, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();

  // ══════════════════════════════════════════════
  // COMPUTE ALL ANGLES (propagating midpoints)
  // ══════════════════════════════════════════════

  // R32: 16 positions evenly spaced
  var r32Angles = [];
  for (var i = 0; i < 16; i++) r32Angles.push(i * 360 / 16);

  // R16: midpoint of each consecutive R32 pair
  var r16Angles = [];
  for (var i = 0; i < 8; i++) {
    r16Angles.push((r32Angles[i*2] + r32Angles[i*2+1]) / 2);
  }

  // QF: midpoint of each consecutive R16 pair
  var qfAngles = [];
  for (var i = 0; i < 4; i++) {
    qfAngles.push((r16Angles[i*2] + r16Angles[i*2+1]) / 2);
  }

  // SF: midpoint of each consecutive QF pair
  var sfAngles = [];
  for (var i = 0; i < 2; i++) {
    sfAngles.push((qfAngles[i*2] + qfAngles[i*2+1]) / 2);
  }

  // ══════════════════════════════════════════════
  // DRAW SPOKES (behind nodes)
  // ══════════════════════════════════════════════

  // R32 match spokes: home + away → junction
  var r32Junctions = [];
  for (var i = 0; i < 16; i++) {
    var base = r32Angles[i];
    var hp = polar(CX, CY, R_R32, base - pairSpan/2);
    var ap = polar(CX, CY, R_R32, base + pairSpan/2);
    var jp = polar(CX, CY, R_R32 - 38*s, base);
    var decided = R32[i].sh !== null;
    var lc = decided ? 'rgba(0,0,0,0.16)' : 'rgba(0,0,0,0.07)';
    var lw = decided ? 1.5 : 1;
    drawLine(hp[0], hp[1], jp[0], jp[1], lc, lw);
    drawLine(ap[0], ap[1], jp[0], jp[1], lc, lw);
    r32Junctions.push(jp);
  }

  // R32 junctions → R16 nodes
  var r16Pos = [];
  for (var i = 0; i < 8; i++) {
    var p = polar(CX, CY, R_R16, r16Angles[i]);
    var j1 = r32Junctions[i*2], j2 = r32Junctions[i*2+1];
    var d1 = R32[i*2].sh !== null, d2 = R32[i*2+1].sh !== null;
    drawLine(j1[0], j1[1], p[0], p[1], d1 ? 'rgba(0,0,0,0.14)' : 'rgba(0,0,0,0.06)', d1 ? 1.3 : 1);
    drawLine(j2[0], j2[1], p[0], p[1], d2 ? 'rgba(0,0,0,0.14)' : 'rgba(0,0,0,0.06)', d2 ? 1.3 : 1);
    r16Pos.push(p);
  }

  // R16 → QF
  var qfPos = [];
  for (var i = 0; i < 4; i++) {
    var p = polar(CX, CY, R_QF, qfAngles[i]);
    drawLine(r16Pos[i*2][0], r16Pos[i*2][1], p[0], p[1], 'rgba(0,0,0,0.05)', 0.8);
    drawLine(r16Pos[i*2+1][0], r16Pos[i*2+1][1], p[0], p[1], 'rgba(0,0,0,0.05)', 0.8);
    qfPos.push(p);
  }

  // QF → SF
  var sfPos = [];
  for (var i = 0; i < 2; i++) {
    var p = polar(CX, CY, R_SF, sfAngles[i]);
    drawLine(qfPos[i*2][0], qfPos[i*2][1], p[0], p[1], 'rgba(0,0,0,0.05)', 0.8);
    drawLine(qfPos[i*2+1][0], qfPos[i*2+1][1], p[0], p[1], 'rgba(0,0,0,0.05)', 0.8);
    sfPos.push(p);
  }

  // SF → Final (center)
  sfPos.forEach(function(sf) {
    drawLine(sf[0], sf[1], CX, CY, 'rgba(180,140,40,0.12)', 1);
  });

  // ══════════════════════════════════════════════
  // DRAW NODES (on top of spokes)
  // ══════════════════════════════════════════════

  // R32 teams
  for (var i = 0; i < 16; i++) {
    var base = r32Angles[i];
    var hp = polar(CX, CY, R_R32, base - pairSpan/2);
    var ap = polar(CX, CY, R_R32, base + pairSpan/2);
    var m = R32[i];
    var hw = m.sh !== null && m.sh > m.sa;
    var aw = m.sh !== null && m.sa > m.sh;
    drawTeamNode(hp[0], hp[1], m.home, nR32, hw ? 'winner' : (aw ? 'eliminated' : 'normal'), s);
    drawTeamNode(ap[0], ap[1], m.away, nR32, aw ? 'winner' : (hw ? 'eliminated' : 'normal'), s);
    drawJunction(r32Junctions[i][0], r32Junctions[i][1], s);
    if (m.sh !== null) {
      var sp = polar(CX, CY, R_R32 - 20*s, base);
      drawScore(sp[0], sp[1], m.sh, m.sa, s);
    }
  }

  // R16 teams
  for (var i = 0; i < 8; i++) {
    var team = R16_KNOWN[i];
    if (team) drawTeamNode(r16Pos[i][0], r16Pos[i][1], team, nR16, 'normal', s);
    else drawEmptyNode(r16Pos[i][0], r16Pos[i][1], nR16);
  }

  // QF & SF empty nodes
  qfPos.forEach(function(p) { drawEmptyNode(p[0], p[1], nQF); });
  sfPos.forEach(function(p) { drawEmptyNode(p[0], p[1], nSF); });

  // ── Trophy at center ──
  ctx.font = (36*s) + 'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F3C6}', CX, CY - 4*s);
  ctx.font = '700 ' + (9*s) + 'px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(160,125,30,0.6)';
  ctx.fillText('FINAL', CX, CY + 24*s);

  // ── Curved round labels along arcs ──
  function drawCurvedText(text, radius, startDeg, letterSpacingDeg, fontSize, color) {
    ctx.save();
    ctx.font = '700 ' + fontSize + 'px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var totalSpan = (text.length - 1) * letterSpacingDeg;
    var curDeg = startDeg - totalSpan / 2;
    for (var c = 0; c < text.length; c++) {
      var rad = (curDeg - 90) * Math.PI / 180;
      var x = CX + radius * Math.cos(rad);
      var y = CY + radius * Math.sin(rad);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rad + Math.PI / 2);
      ctx.fillText(text[c], 0, 0);
      ctx.restore();
      curDeg += letterSpacingDeg;
    }
    ctx.restore();
  }

  var labelColor = 'rgba(0,0,0,0.22)';
  drawCurvedText('R O U N D   O F   3 2', (R_R16+R_R32)/2 + 2*s, 270, 3.2, 10*s, labelColor);
  drawCurvedText('R O U N D   O F   1 6', (R_QF+R_R16)/2, 270, 3.8, 9.5*s, labelColor);
  drawCurvedText('Q U A R T E R - F I N A L S', (R_SF+R_QF)/2, 270, 3.2, 8.5*s, labelColor);
  drawCurvedText('S E M I - F I N A L S', R_SF - 14*s, 270, 4.2, 7.5*s, labelColor);
}

// ── Tab switching ──
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.getElementById('versionLabel').textContent = LABELS[currentMode];
    draw();
  });
});

draw();
window.addEventListener('resize', draw);

</script>
