steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    dir: proxy
    args:
      - '-c'
      - 'gcloud run deploy trivia-proxy --source=. --region=us-central1 --allow-unauthenticated --set-env-vars=GITHUB_PAT=$$GITHUB_PAT'
    secretEnv: ['GITHUB_PAT']

availableSecrets:
  secretManager:
    - versionName: projects/matchmondo-trivia-proxy/secrets/GITHUB_PAT/versions/latest
      env: 'GITHUB_PAT'

# Required because the trigger runs as a user-specified service account
# (the compute SA): such builds must direct logs explicitly.
options:
  logging: CLOUD_LOGGING_ONLY
