name: Tests

# Runs the domain-logic test suite on every push and PR. Catches regressions
# in match_resolver (and future extracted modules) before they reach the
# scheduled cron jobs.
on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run domain-logic tests
        run: python3 -m unittest discover -s scripts -v
