name: Update scores

# Refreshes match data (scores + filled-in knockout teams) from the live fixture feed
# and commits it, so the published site always shows current scores with no manual work.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate data from the live feed
        run: python3 scripts/update-data.py

      - name: Commit and push if anything changed
        run: |
          if [ -n "$(git status --porcelain data/ world-cup-2026.ics)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/matches.js data/matches.json world-cup-2026.ics
            git commit -m "Auto-update scores ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Pushed updated data."
          else
            echo "No changes."
          fi
