name: Update scores

# Refreshes match data (scores + filled-in knockout teams) from the live fixture feed
# and commits it, so the published site always shows current scores with no manual work.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write
  issues: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate data from the live feed
        run: python3 scripts/update-data.py

      - name: Patch scores from ESPN
        run: python3 scripts/update-espn-scores.py

      - name: Update highlight video links
        run: python3 scripts/update-highlights.py

      - name: Verify bracket against ESPN
        run: python3 scripts/verify-bracket.py

      - name: Commit and push if anything changed
        run: |
          if [ -n "$(git status --porcelain data/ world-cup-2026.ics)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/matches.js data/matches.json data/highlights.json world-cup-2026.ics
            git commit -m "Auto-update scores ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Pushed updated data."
          else
            echo "No changes."
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Score update workflow failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'score-update-failure',
              per_page: 1,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The score update workflow failed at ${new Date().toISOString()}.\n\n[View run](${runUrl})`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['score-update-failure'],
              });
            }
