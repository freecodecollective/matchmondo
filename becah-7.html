<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout tracker · Week ring</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f3f1ec;
  --color-background-tertiary:#edebe4;
  --color-background-info:#E6F1FB;
  --color-text-primary:#1f1f1d;
  --color-text-secondary:#6b6a64;
  --color-text-tertiary:#a09f97;
  --color-text-info:#0C447C;
  --color-border-tertiary:rgba(20,20,15,0.12);
  --color-border-secondary:rgba(20,20,15,0.20);
  --color-border-info:#378ADD;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-weight:400;
  background:var(--color-background-tertiary);
  color:var(--color-text-primary);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 16px 48px;
  line-height:1.5;
}
.page-head{
  width:100%;
  max-width:340px;
  margin-bottom:18px;
  padding:0 4px;
}
.page-head h1{
  font-size:19px;
  font-weight:500;
  letter-spacing:-0.01em;
}
.page-head p{
  font-size:14px;
  color:var(--color-text-secondary);
  margin-top:3px;
}
.phone{
  width:340px;
  max-width:100%;
  background:var(--color-background-primary);
  border-radius:26px;
  border:0.5px solid var(--color-border-tertiary);
  padding:26px 20px 22px;
}

/* HERO ring */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:6px;
}
.ring-wrap{
  position:relative;
  width:200px;
  height:200px;
}
.ring-wrap svg{
  width:200px;
  height:200px;
  transform:rotate(-90deg);
}
.unit-fill{
  transition:stroke-dashoffset .55s cubic-bezier(.4,0,.2,1);
}
.ring-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}
.ring-center .done{
  font-size:34px;
  font-weight:500;
  letter-spacing:-0.02em;
  line-height:1.05;
}
.ring-center .done .total{
  color:var(--color-text-tertiary);
  font-weight:400;
}
.ring-center .pct{
  font-size:14px;
  color:var(--color-text-secondary);
  margin-top:4px;
}
.ring-center .pct .extra{
  color:var(--color-text-tertiary);
}
.left-line{
  font-size:14px;
  color:var(--color-text-secondary);
  margin-top:12px;
}
.left-line.done-all{
  color:var(--color-text-primary);
}

/* legend */
.legend{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px 14px;
  margin:16px 0 22px;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--color-text-secondary);
}
.legend-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  flex:none;
}

.section-label{
  font-size:12px;
  color:var(--color-text-tertiary);
  margin-bottom:10px;
  letter-spacing:0.01em;
}

/* tiles */
.tiles{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:22px;
}
.tile{
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  padding:12px 12px 11px;
  text-align:left;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  gap:7px;
  transition:transform .08s ease,background .15s ease;
}
.tile:active{transform:scale(0.97);}
.tile-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.tile-top i{font-size:22px;}
.tile-badge{
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:10px;
  background:var(--color-background-info);
  color:var(--color-text-info);
  font-size:12px;
  font-weight:500;
  display:none;
  align-items:center;
  justify-content:center;
}
.tile.has-count .tile-badge{display:inline-flex;}
.tile-name{
  font-size:14px;
  font-weight:500;
  color:var(--color-text-primary);
}
.tile-dur{
  font-size:12px;
  color:var(--color-text-secondary);
}
.tile.util{
  background:var(--color-background-primary);
}
.tile.util .tile-top i{color:var(--color-text-secondary);}

/* today log */
.today{
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-lg);
  padding:14px 14px 13px;
}
.today-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:8px;
}
.today-head .t{
  font-size:13px;
  font-weight:500;
  color:var(--color-text-primary);
}
.today-head .total{
  font-size:13px;
  color:var(--color-text-secondary);
}
.today-empty{
  font-size:13px;
  color:var(--color-text-tertiary);
}
.log-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:5px 0;
}
.log-row i{font-size:17px;}
.log-row .lname{
  font-size:13px;
  color:var(--color-text-primary);
  flex:1;
}
.log-row .ldur{
  font-size:13px;
  color:var(--color-text-secondary);
}
</style>
</head>
<body>
<div class="page-head">
  <h1>Workout tracker</h1>
  <p>Week ring · the whole week in one ring</p>
</div>

<div class="phone">
  <div class="hero">
    <div class="ring-wrap">
      <svg viewBox="0 0 200 200" aria-hidden="true" id="ring-svg"></svg>
      <div class="ring-center">
        <div class="done"><span id="done-num">7</span><span class="total" id="total-num">/11</span></div>
        <div class="pct"><span id="pct-num">64%</span><span id="extra-num"></span></div>
      </div>
    </div>
    <div class="left-line" id="left-line">4 left this week</div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="section-label">Log a session</div>
  <div class="tiles" id="tiles"></div>

  <div class="today">
    <div class="today-head">
      <span class="t">Today</span>
      <span class="total" id="today-total"></span>
    </div>
    <div id="today-log"></div>
  </div>
</div>

<script>
const workouts = {
  tonal1:{name:'Tonal · Workout 1', short:'Tonal 1', color:'#378ADD', dur:15, goal:2, icon:'ti-bolt'},
  tonal2:{name:'Tonal · Workout 2', short:'Tonal 2', color:'#185FA5', dur:15, goal:2, icon:'ti-bolt'},
  pilates:{name:'Pilates', short:'Pilates', color:'#1D9E75', dur:25, goal:3, icon:'ti-yoga'},
  hills:{name:'Hills', short:'Hills', color:'#BA7517', dur:40, goal:4, icon:'ti-mountain'}
};
const order = ['tonal1','tonal2','pilates','hills'];

const week = [
  [{w:'tonal1',min:15},{w:'hills',min:40}],
  [{w:'pilates',min:25},{w:'hills',min:35}],
  [{w:'tonal2',min:15}],
  [{w:'pilates',min:25},{w:'hills',min:52}],
  [],
  [],
  []
];
const todayIndex = 5;

function weekCount(id){
  let c = 0;
  for(const day of week){ for(const e of day){ if(e.w===id) c++; } }
  return c;
}

/* ---- One big ring split into 11 units ---- */
const CX = 100, CY = 100, R = 84, SW = 16;
const TOTAL_UNITS = order.reduce((s,id)=>s+workouts[id].goal,0); // 11
const UNIT_GAP = 2.2;   // degrees of gap between units in a group
const GROUP_GAP = 7;    // degrees of extra gap between workout groups

// Build the per-unit angular layout. Total 360 deg shared by 11 units
// plus the inter-unit gaps and inter-group gaps.
function buildLayout(){
  const gapTotal =
    order.reduce((s,id)=> s + (workouts[id].goal - 1) * UNIT_GAP, 0) +
    order.length * GROUP_GAP;
  const arcTotal = 360 - gapTotal;
  const unitArc = arcTotal / TOTAL_UNITS;

  const units = [];
  let angle = 0; // degrees, 0 = top after the -90 svg rotation
  order.forEach((id) => {
    const w = workouts[id];
    for(let i = 0; i < w.goal; i++){
      units.push({ id, start: angle, sweep: unitArc });
      angle += unitArc;
      if(i < w.goal - 1) angle += UNIT_GAP;
    }
    angle += GROUP_GAP;
  });
  return units;
}
const units = buildLayout();
const CIRC = 2 * Math.PI * R;

function buildRing(){
  const svg = document.getElementById('ring-svg');
  let html = '';
  units.forEach((u, idx) => {
    const color = workouts[u.id].color;
    const dashLen = (u.sweep / 360) * CIRC;
    const offset = -((u.start / 360) * CIRC);
    // faint track for the unit
    html += `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none"
      stroke="var(--color-border-tertiary)" stroke-width="${SW}" stroke-linecap="butt"
      stroke-dasharray="${dashLen.toFixed(2)} ${(CIRC - dashLen).toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}"></circle>`;
    // solid fill, revealed by collapsing its own dashoffset
    html += `<circle class="unit-fill" id="unit-${idx}" cx="${CX}" cy="${CY}" r="${R}" fill="none"
      stroke="${color}" stroke-width="${SW}" stroke-linecap="butt"
      stroke-dasharray="0 ${CIRC.toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}"
      data-len="${dashLen.toFixed(2)}" data-off="${offset.toFixed(2)}"></circle>`;
  });
  svg.innerHTML = html;
}

function renderRing(){
  // determine, per workout, how many units are done (capped at goal)
  const doneByWorkout = {};
  for(const id of order){ doneByWorkout[id] = Math.min(weekCount(id), workouts[id].goal); }
  const filledSoFar = {};
  for(const id of order){ filledSoFar[id] = 0; }

  units.forEach((u, idx) => {
    const el = document.getElementById('unit-' + idx);
    const len = parseFloat(el.dataset.len);
    const filled = filledSoFar[u.id] < doneByWorkout[u.id];
    if(filled) filledSoFar[u.id]++;
    el.style.strokeDasharray = filled
      ? `${len} ${(CIRC - len).toFixed(2)}`
      : `0 ${CIRC.toFixed(2)}`;
  });
}

function buildLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = '';
  for(const id of order){
    const w = workouts[id];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${w.color}"></span>${w.short}`;
    el.appendChild(item);
  }
}

function buildTiles(){
  const el = document.getElementById('tiles');
  el.innerHTML = '';
  for(const id of order){
    const w = workouts[id];
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.id = 'tile-' + id;
    btn.setAttribute('aria-label', 'Log ' + w.name);
    btn.innerHTML = `
      <div class="tile-top">
        <i class="${w.icon}" style="color:${w.color}" aria-hidden="true"></i>
        <span class="tile-badge">0</span>
      </div>
      <div class="tile-name">${w.short}</div>
      <div class="tile-dur">${w.dur} min</div>`;
    btn.addEventListener('click', () => logSession(id, w.dur));
    el.appendChild(btn);
  }

  const custom = document.createElement('button');
  custom.className = 'tile util';
  custom.setAttribute('aria-label', 'Log a custom session');
  custom.innerHTML = `
    <div class="tile-top"><i class="ti ti-plus" aria-hidden="true"></i></div>
    <div class="tile-name">Custom</div>
    <div class="tile-dur">Pick workout & time</div>`;
  custom.addEventListener('click', logCustom);
  el.appendChild(custom);

  const edit = document.createElement('button');
  edit.className = 'tile util';
  edit.setAttribute('aria-label', 'Edit workouts and goals');
  edit.innerHTML = `
    <div class="tile-top"><i class="ti ti-adjustments" aria-hidden="true"></i></div>
    <div class="tile-name">Edit</div>
    <div class="tile-dur">Rename & set goals</div>`;
  edit.addEventListener('click', () => alert('Down the road: rename workouts and change goals here.'));
  el.appendChild(edit);
}

function logSession(id, min){
  week[todayIndex].push({w:id, min:min});
  render();
}

function logCustom(){
  const labels = order.map((id,i) => (i+1) + '. ' + workouts[id].short).join('\n');
  const pick = prompt('Custom log — which workout?\n' + labels + '\n\nEnter a number 1–4:');
  if(pick === null) return;
  const idx = parseInt(pick, 10) - 1;
  if(isNaN(idx) || idx < 0 || idx >= order.length){ return; }
  const id = order[idx];
  const minRaw = prompt('Minutes for this session?', String(workouts[id].dur));
  if(minRaw === null) return;
  let min = Math.round(parseFloat(minRaw));
  if(isNaN(min) || min <= 0){ min = workouts[id].dur; }
  logSession(id, min);
}

function renderAggregate(){
  let weekTarget = 0, weekDone = 0, weekExtra = 0, left = 0;
  for(const id of order){
    const w = workouts[id];
    const count = weekCount(id);
    weekTarget += w.goal;
    weekDone += Math.min(count, w.goal);
    weekExtra += Math.max(0, count - w.goal);
    left += Math.max(0, w.goal - count);
  }
  const pct = Math.round(weekDone / weekTarget * 100);
  document.getElementById('done-num').textContent = weekDone;
  document.getElementById('total-num').textContent = '/' + weekTarget;
  document.getElementById('pct-num').textContent = pct + '%';
  document.getElementById('extra-num').innerHTML =
    weekExtra > 0 ? ' <span class="extra">+' + weekExtra + '</span>' : '';

  const leftEl = document.getElementById('left-line');
  if(left === 0){
    leftEl.textContent = 'All caught up this week';
    leftEl.classList.add('done-all');
  } else {
    leftEl.textContent = left + ' left this week';
    leftEl.classList.remove('done-all');
  }
}

function renderTiles(){
  for(const id of order){
    const count = week[todayIndex].filter(e => e.w === id).length;
    const tile = document.getElementById('tile-' + id);
    tile.classList.toggle('has-count', count > 0);
    tile.querySelector('.tile-badge').textContent = count;
  }
}

function renderToday(){
  const entries = week[todayIndex];
  const logEl = document.getElementById('today-log');
  const totalEl = document.getElementById('today-total');
  if(entries.length === 0){
    logEl.innerHTML = '<div class="today-empty">Nothing logged yet — it’s Saturday.</div>';
    totalEl.textContent = '';
    return;
  }
  let total = 0;
  logEl.innerHTML = '';
  for(const e of entries){
    const w = workouts[e.w];
    total += e.min;
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `
      <i class="${w.icon}" style="color:${w.color}" aria-hidden="true"></i>
      <span class="lname">${w.name}</span>
      <span class="ldur">${Math.round(e.min)} min</span>`;
    logEl.appendChild(row);
  }
  totalEl.textContent = Math.round(total) + ' min today';
}

function render(){
  renderRing();
  renderAggregate();
  renderTiles();
  renderToday();
}

buildRing();
buildLegend();
buildTiles();
renderAggregate();
renderTiles();
renderToday();
// reveal fills on next frame so the dashoffset transition animates in
requestAnimationFrame(() => renderRing());
</script>
</body>
</html>
