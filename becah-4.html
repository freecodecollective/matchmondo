<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout tracker · Glance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary:#ffffff;
    --color-background-secondary:#f3f1ec;
    --color-background-tertiary:#edebe4;
    --color-background-info:#E6F1FB;
    --color-text-primary:#1f1f1d;
    --color-text-secondary:#6b6a64;
    --color-text-tertiary:#a09f97;
    --color-text-info:#0C447C;
    --color-border-tertiary:rgba(20,20,15,0.12);
    --color-border-secondary:rgba(20,20,15,0.20);
    --color-border-info:#378ADD;
    --border-radius-md:8px;
    --border-radius-lg:12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    font-weight: 400;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 32px 16px 48px;
  }
  .page-head {
    max-width: 560px;
    margin: 0 auto 16px;
    padding: 0 4px;
  }
  .page-head h1 {
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .page-head p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 2px;
  }
  .card {
    max-width: 560px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
  }
  .zone {
    padding: 18px 20px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .zone:last-child { border-bottom: none; }

  .row-between {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .zone-title {
    font-size: 15px;
    font-weight: 500;
  }
  .muted {
    color: var(--color-text-secondary);
    font-size: 13px;
  }
  .tertiary { color: var(--color-text-tertiary); }

  .hero {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 14px;
  }
  .hero-num {
    font-size: 52px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .hero-label {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.3;
  }
  .metric-chips {
    display: flex;
    gap: 12px;
    margin-left: auto;
  }
  .metric {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 14px;
    min-width: 92px;
  }
  .metric .m-label {
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .metric .m-num {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.2;
    margin-top: 2px;
  }

  /* two-column on desktop */
  .split {
    display: grid;
    grid-template-columns: 1fr;
  }
  @media (min-width: 620px) {
    body { padding-top: 48px; }
    .card { max-width: 720px; }
    .split {
      grid-template-columns: minmax(0,1fr) minmax(0,1fr);
    }
    .split > .col-left { border-right: 0.5px solid var(--color-border-tertiary); }
    .split > .col-left > .zone:last-child { border-bottom: none; }
  }

  /* goals */
  .goal {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }
  .goal:first-of-type { padding-top: 4px; }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .goal-name {
    font-size: 14px;
    width: 92px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .goal-dur {
    font-size: 12px;
    color: var(--color-text-tertiary);
  }
  .track {
    flex: 1;
    height: 6px;
    background: var(--color-border-tertiary);
    border-radius: 999px;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.25s ease;
  }
  .goal-count {
    font-size: 13px;
    width: 52px;
    text-align: right;
    flex-shrink: 0;
    color: var(--color-text-secondary);
  }
  .goal-count .over {
    color: var(--color-text-tertiary);
    font-size: 12px;
  }

  /* week strip */
  .week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 14px;
  }
  .day {
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 7px 4px 8px;
    text-align: center;
    min-height: 58px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .day.today {
    background: var(--color-background-info);
    border-color: var(--color-border-info);
  }
  .day.future { opacity: 0.45; }
  .day .dow {
    font-size: 11px;
    color: var(--color-text-tertiary);
    text-transform: lowercase;
  }
  .day .dnum {
    font-size: 13px;
    font-weight: 500;
  }
  .day.today .dnum { color: var(--color-text-info); }
  .day-dots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 3px;
    min-height: 9px;
    margin-top: 1px;
  }
  .day-dots .dot { width: 7px; height: 7px; }

  /* heatmap */
  .heat-head, .heat-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .heat-head {
    margin: 12px 0 5px;
  }
  .heat-head span {
    font-size: 11px;
    color: var(--color-text-tertiary);
    text-align: center;
  }
  .heat-cell {
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    background: var(--color-background-secondary);
  }
  .heat-cell.future { opacity: 0.4; }
  .heat-cell.today { box-shadow: inset 0 0 0 2px var(--color-border-info); }
  .heat-cell.empty-slot { background: transparent; }
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--color-text-tertiary);
  }
  .legend .swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    display: inline-block;
  }

  /* quick log */
  .log-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease;
  }
  .chip:hover { background: var(--color-background-secondary); }
  .chip:active { transform: scale(0.98); }
  .chip i { font-size: 16px; line-height: 1; }
  .chip .chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .chip .badge {
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    min-width: 17px;
    height: 17px;
    padding: 0 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .chip.subtle {
    border-style: dashed;
    border-color: var(--color-border-tertiary);
    color: var(--color-text-secondary);
    font-weight: 400;
  }
</style>
</head>
<body>

  <div class="page-head">
    <h1>Workout tracker</h1>
    <p>Glance · everything at once</p>
  </div>

  <div class="card">

    <!-- Zone 1 + 2: header + hero stat -->
    <div class="zone">
      <div class="row-between">
        <span class="zone-title">This week</span>
        <span class="muted">Jun 15 – 21</span>
      </div>
      <div class="hero">
        <span class="hero-num" id="heroNum">4</span>
        <span class="hero-label">left<br>this week</span>
        <div class="metric-chips">
          <div class="metric">
            <div class="m-label">Sessions</div>
            <div class="m-num"><span id="sessDone">4</span> / <span id="sessGoal">11</span></div>
          </div>
          <div class="metric">
            <div class="m-label">Minutes</div>
            <div class="m-num" id="minTotal">222</div>
          </div>
        </div>
      </div>
    </div>

    <div class="split">
      <div class="col-left">

        <!-- Zone 3: goals -->
        <div class="zone">
          <span class="zone-title">Goals</span>
          <div id="goals"></div>
        </div>

      </div>
      <div class="col-right">

        <!-- Zone 4: week strip -->
        <div class="zone">
          <span class="zone-title">Week</span>
          <div class="week" id="weekStrip"></div>
        </div>

        <!-- Zone 5: month heatmap -->
        <div class="zone">
          <div class="row-between">
            <span class="zone-title">June</span>
          </div>
          <div class="heat-head">
            <span>m</span><span>t</span><span>w</span><span>t</span><span>f</span><span>s</span><span>s</span>
          </div>
          <div class="heat-grid" id="heatGrid"></div>
          <div class="legend">
            <span>less</span>
            <span class="swatch" style="background:var(--color-background-secondary)"></span>
            <span class="swatch" style="background:#E6F1FB"></span>
            <span class="swatch" style="background:#85B7EB"></span>
            <span class="swatch" style="background:#378ADD"></span>
            <span>more</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Zone 6: quick log -->
    <div class="zone">
      <span class="zone-title">Quick log</span>
      <div class="log-row" id="logRow"></div>
    </div>

  </div>

<script>
  const workouts = {
    tonal1:  { name:'Tonal · workout 1', short:'Tonal 1', color:'#378ADD', dur:15, goal:2, icon:'ti-bolt' },
    tonal2:  { name:'Tonal · workout 2', short:'Tonal 2', color:'#185FA5', dur:15, goal:2, icon:'ti-bolt' },
    pilates: { name:'Pilates',           short:'Pilates', color:'#1D9E75', dur:25, goal:3, icon:'ti-yoga' },
    hills:   { name:'Hills',             short:'Hills',   color:'#BA7517', dur:40, goal:4, icon:'ti-mountain' }
  };
  const order = ['tonal1','tonal2','pilates','hills'];
  const TODAY = 5; // Sat 20

  // week entries: [workoutKey, durationMinutes]
  const week = [
    [['tonal1',15],['hills',40]],   // Mon 15
    [['pilates',25],['hills',35]],  // Tue 16
    [['tonal2',15]],                // Wed 17
    [['pilates',25],['hills',52]],  // Thu 18
    [],                             // Fri 19
    [],                             // Sat 20 (today)
    []                              // Sun 21
  ];
  const weekDates = [15,16,17,18,19,20,21];
  const dowLabels = ['mon','tue','wed','thu','fri','sat','sun'];

  // prior-day session totals for June heatmap (days 1..14)
  const priorTotals = {1:2,2:1,3:2,4:1,5:0,6:3,7:0,8:1,9:2,10:0,11:2,12:1,13:2,14:0};

  function counts() {
    const c = {};
    order.forEach(k => c[k] = 0);
    week.forEach(day => day.forEach(([k]) => c[k]++));
    return c;
  }

  function render() {
    const c = counts();

    // hero: left this week
    let left = 0;
    order.forEach(k => left += Math.max(0, workouts[k].goal - c[k]));
    document.getElementById('heroNum').textContent = Math.round(left);

    // sessions done + total goal sessions
    let done = 0, goalSessions = 0, minutes = 0;
    order.forEach(k => goalSessions += workouts[k].goal);
    week.forEach(day => day.forEach(([k,d]) => { done++; minutes += d; }));
    document.getElementById('sessDone').textContent = Math.round(done);
    document.getElementById('sessGoal').textContent = Math.round(goalSessions);
    document.getElementById('minTotal').textContent = Math.round(minutes);

    // goals bars
    const goalsEl = document.getElementById('goals');
    goalsEl.innerHTML = '';
    order.forEach(k => {
      const w = workouts[k];
      const n = c[k];
      const pct = Math.min(100, Math.round((n / w.goal) * 100));
      const over = n > w.goal ? n - w.goal : 0;
      const row = document.createElement('div');
      row.className = 'goal';
      row.innerHTML =
        '<span class="dot" style="background:' + w.color + '"></span>' +
        '<span class="goal-name">' + w.short + ' <span class="goal-dur">' + w.dur + 'm</span></span>' +
        '<span class="track"><span class="fill" style="width:' + pct + '%;background:' + w.color + '"></span></span>' +
        '<span class="goal-count">' + Math.round(Math.min(n, w.goal)) + '/' + w.goal +
          (over ? ' <span class="over">+' + Math.round(over) + '</span>' : '') + '</span>';
      goalsEl.appendChild(row);
    });

    // week strip
    const strip = document.getElementById('weekStrip');
    strip.innerHTML = '';
    week.forEach((day, i) => {
      const cell = document.createElement('div');
      cell.className = 'day' + (i === TODAY ? ' today' : '') + (i > TODAY ? ' future' : '');
      let dots = '';
      day.forEach(([k]) => { dots += '<span class="dot" style="background:' + workouts[k].color + '"></span>'; });
      cell.innerHTML =
        '<span class="dow">' + dowLabels[i] + '</span>' +
        '<span class="dnum">' + weekDates[i] + '</span>' +
        '<span class="day-dots">' + dots + '</span>';
      strip.appendChild(cell);
    });

    // heatmap (June 1 2026 = Monday => column 1, index 0)
    const heat = document.getElementById('heatGrid');
    heat.innerHTML = '';
    function tint(total) {
      if (total <= 0) return 'var(--color-background-secondary)';
      if (total === 1) return '#E6F1FB';
      if (total === 2) return '#85B7EB';
      return '#378ADD';
    }
    for (let d = 1; d <= 30; d++) {
      const cell = document.createElement('div');
      let total, future = false;
      if (d <= 14) {
        total = priorTotals[d];
      } else if (d <= 20) {
        // derive from this week (Jun15 = index0 .. Jun20 = index5)
        const idx = d - 15;
        total = week[idx].length;
        if (d > 20) future = true;
      } else {
        total = 0;
        future = true;
      }
      const isToday = (d === 20);
      cell.className = 'heat-cell' + (future && !isToday ? ' future' : '') + (isToday ? ' today' : '');
      cell.style.background = future && !isToday ? 'var(--color-background-secondary)' : tint(total);
      cell.title = 'Jun ' + d + ' · ' + Math.round(total || 0) + (total === 1 ? ' session' : ' sessions');
      heat.appendChild(cell);
    }

    // quick log chips
    const logRow = document.getElementById('logRow');
    logRow.innerHTML = '';
    order.forEach(k => {
      const w = workouts[k];
      const todayCount = week[TODAY].filter(e => e[0] === k).length;
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.innerHTML =
        '<span class="chip-dot" style="background:' + w.color + '"></span>' +
        '<i class="ti ' + w.icon + '" aria-hidden="true"></i>' +
        w.short +
        (todayCount > 0 ? '<span class="badge">' + Math.round(todayCount) + '</span>' : '');
      btn.setAttribute('aria-label', 'Log ' + w.name);
      btn.onclick = () => { week[TODAY].push([k, w.dur]); render(); };
      logRow.appendChild(btn);
    });

    // custom
    const custom = document.createElement('button');
    custom.className = 'chip subtle';
    custom.innerHTML = '<i class="ti ti-plus" aria-hidden="true"></i>Custom';
    custom.onclick = () => {
      const mins = prompt('Custom session — minutes?', '30');
      if (mins === null) return;
      const m = parseInt(mins, 10);
      week[TODAY].push(['hills', isNaN(m) ? 30 : m]);
      render();
    };
    logRow.appendChild(custom);

    // edit
    const edit = document.createElement('button');
    edit.className = 'chip subtle';
    edit.innerHTML = '<i class="ti ti-edit" aria-hidden="true"></i>Edit';
    edit.onclick = () => alert('Down the road: rename workouts and change goals here.');
    logRow.appendChild(edit);
  }

  render();
</script>
</body>
</html>
