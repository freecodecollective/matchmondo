<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout tracker · This week's plan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f3f1ec;
  --color-background-tertiary:#edebe4;
  --color-background-info:#E6F1FB;
  --color-text-primary:#1f1f1d;
  --color-text-secondary:#6b6a64;
  --color-text-tertiary:#a09f97;
  --color-text-info:#0C447C;
  --color-border-tertiary:rgba(20,20,15,0.12);
  --color-border-secondary:rgba(20,20,15,0.20);
  --color-border-info:#378ADD;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-serif:Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--color-background-tertiary);
  font-family:var(--font-sans);
  color:var(--color-text-primary);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 16px 56px;
}
.page-header{
  width:100%;
  max-width:340px;
  margin-bottom:18px;
  padding:0 4px;
}
.page-header h1{
  font-family:var(--font-serif);
  font-weight:400;
  font-size:21px;
  letter-spacing:0.2px;
  color:var(--color-text-primary);
}
.page-header p{
  margin-top:5px;
  font-size:13px;
  color:var(--color-text-secondary);
  line-height:1.5;
}

/* phone frame */
.phone{
  width:340px;
  max-width:100%;
  background:var(--color-background-primary);
  border-radius:26px;
  border:0.5px solid var(--color-border-tertiary);
  padding:26px 22px 22px;
  display:flex;
  flex-direction:column;
}

/* week header */
.week-top{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:14px;
}
.week-label{
  font-size:14px;
  font-weight:500;
  color:var(--color-text-primary);
}
.week-range{
  font-size:13px;
  color:var(--color-text-tertiary);
}
.headline{
  font-family:var(--font-serif);
  font-weight:400;
  font-size:27px;
  line-height:1.2;
  color:var(--color-text-primary);
  margin-bottom:22px;
  letter-spacing:0.2px;
}

/* aggregate weekly progress */
.weekbar{
  margin:-8px 0 24px;
}
.weekbar-cells{
  display:flex;
  align-items:center;
  gap:5px;
  height:10px;
}
.weekbar-cells .gap{
  width:7px;
  flex:0 0 auto;
}
.weekbar-cells .wcell{
  flex:1 1 0;
  height:10px;
  border-radius:3px;
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  transition:background-color 0.32s ease,border-color 0.32s ease;
}
.weekbar-cells .wcell.filled{
  border-color:transparent;
}
.weekbar-label{
  margin-top:9px;
  font-size:12px;
  color:var(--color-text-secondary);
  font-variant-numeric:tabular-nums;
  letter-spacing:0.1px;
}
.weekbar-label .extra{
  color:var(--color-text-tertiary);
}

/* plan groups */
.group{
  margin-bottom:18px;
}
.group-head{
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 2px 6px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  flex:0 0 auto;
}
.group-name{
  font-size:14px;
  font-weight:500;
  color:var(--color-text-primary);
  flex:1 1 auto;
}
.group-target{
  font-size:12px;
  color:var(--color-text-tertiary);
  font-variant-numeric:tabular-nums;
}

/* rows */
.row{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:44px;
  padding:4px 2px;
  border-top:0.5px solid var(--color-border-tertiary);
  cursor:pointer;
  background:none;
  width:100%;
  text-align:left;
  font:inherit;
  color:inherit;
}
.row:first-of-type{border-top:none;}
.row .mark{
  width:22px;
  height:22px;
  border-radius:50%;
  flex:0 0 auto;
  border:1.5px solid var(--color-border-secondary);
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  font-size:14px;
  transition:background-color 0.32s ease,border-color 0.32s ease;
}
.row .mark i{
  opacity:0;
  transform:scale(0.6);
  transition:opacity 0.28s ease,transform 0.32s ease;
}
.row.done .mark{border-color:transparent;}
.row.done .mark i{opacity:1;transform:scale(1);}
.row .label{
  flex:1 1 auto;
  font-size:14px;
  color:var(--color-text-primary);
  transition:color 0.3s ease;
}
.row .mins{
  font-size:13px;
  color:var(--color-text-tertiary);
  font-variant-numeric:tabular-nums;
  transition:color 0.3s ease;
}
.row.done .mins{color:var(--color-text-secondary);}

/* add another */
.add-row{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:38px;
  padding:4px 2px;
  border-top:0.5px solid var(--color-border-tertiary);
  cursor:pointer;
  background:none;
  width:100%;
  text-align:left;
  font:inherit;
  color:var(--color-text-tertiary);
}
.add-row .mark-ghost{
  width:22px;
  height:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex:0 0 auto;
}
.add-row .add-label{
  font-size:13px;
  color:var(--color-text-secondary);
}
.group-progress{
  font-size:12px;
  color:var(--color-text-tertiary);
  padding:6px 2px 0;
  font-variant-numeric:tabular-nums;
}

/* month strip */
.month{
  margin-top:8px;
  padding-top:18px;
  border-top:0.5px solid var(--color-border-tertiary);
}
.month-label{
  font-size:12px;
  color:var(--color-text-secondary);
  margin-bottom:10px;
}
.month-grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:6px;
}
.cell{
  aspect-ratio:1/1;
  border-radius:3px;
  background:var(--color-background-secondary);
}
.cell.future{opacity:0.45;}
.cell.today{
  box-shadow:inset 0 0 0 2px var(--color-border-info);
}
</style>
</head>
<body>

<header class="page-header">
  <h1>Workout tracker</h1>
  <p>This week's plan · check off what you do</p>
</header>

<main class="phone">
  <div class="week-top">
    <span class="week-label">This week</span>
    <span class="week-range">Jun 15 – 21</span>
  </div>
  <h2 class="headline" id="headline">4 left this week</h2>

  <div class="weekbar" id="weekbar">
    <div class="weekbar-cells" id="weekbar-cells"></div>
    <div class="weekbar-label" id="weekbar-label"></div>
  </div>

  <div id="plan"></div>

  <section class="month">
    <p class="month-label">June</p>
    <div class="month-grid" id="month-grid"></div>
  </section>
</main>

<script>
const workouts=[
  {id:'tonal1',name:'Tonal · Workout 1',short:'Tonal 1',color:'#378ADD',dur:15,goal:2,icon:'ti-bolt',count:1},
  {id:'tonal2',name:'Tonal · Workout 2',short:'Tonal 2',color:'#185FA5',dur:15,goal:2,icon:'ti-bolt',count:1},
  {id:'pilates',name:'Pilates',short:'Pilates',color:'#1D9E75',dur:25,goal:3,icon:'ti-yoga',count:2},
  {id:'hills',name:'Hills',short:'Hills',color:'#BA7517',dur:40,goal:4,icon:'ti-mountain',count:3}
];

const sessions={};
workouts.forEach(w=>{
  const rows=[];
  for(let i=0;i<w.goal;i++){
    rows.push({done:i<w.count,mins:w.dur});
  }
  sessions[w.id]=rows;
});

function leftThisWeek(){
  let left=0;
  workouts.forEach(w=>{
    const doneCount=sessions[w.id].filter(r=>r.done).length;
    left+=Math.max(0,w.goal-doneCount);
  });
  return left;
}

function completedThisWeek(){
  let n=0;
  workouts.forEach(w=>{n+=sessions[w.id].filter(r=>r.done).length;});
  return n;
}

function renderHeadline(){
  const left=leftThisWeek();
  const el=document.getElementById('headline');
  el.textContent = left===0 ? 'All done this week' : left+' left this week';
}

function renderWeekBar(){
  const cells=document.getElementById('weekbar-cells');
  const label=document.getElementById('weekbar-label');
  cells.innerHTML='';

  let weekTarget=0, weekDone=0, extras=0;
  workouts.forEach((w,wi)=>{
    const doneCount=sessions[w.id].filter(r=>r.done).length;
    const capped=Math.min(doneCount,w.goal);
    weekTarget+=w.goal;
    weekDone+=capped;
    extras+=Math.max(0,doneCount-w.goal);

    if(wi>0){
      const gap=document.createElement('span');
      gap.className='gap';
      cells.appendChild(gap);
    }
    for(let i=0;i<w.goal;i++){
      const cell=document.createElement('span');
      cell.className='wcell'+(i<capped?' filled':'');
      if(i<capped){cell.style.background=w.color;}
      cells.appendChild(cell);
    }
  });

  const weekPct=Math.round(weekDone/weekTarget*100);
  let text='This week · '+weekDone+' of '+weekTarget+' · '+weekPct+'%';
  if(extras>0){text+=' <span class="extra">+'+extras+'</span>';}
  label.innerHTML=text;
}

function renderPlan(){
  const plan=document.getElementById('plan');
  plan.innerHTML='';
  workouts.forEach(w=>{
    const rows=sessions[w.id];
    const doneCount=rows.filter(r=>r.done).length;

    const group=document.createElement('div');
    group.className='group';

    const head=document.createElement('div');
    head.className='group-head';
    head.innerHTML=
      '<span class="dot" style="background:'+w.color+'"></span>'+
      '<span class="group-name">'+w.name+'</span>'+
      '<span class="group-target">'+w.goal+' / week</span>';
    group.appendChild(head);

    rows.forEach((r,idx)=>{
      const row=document.createElement('button');
      row.className='row'+(r.done?' done':'');
      const markStyle=r.done?'background:'+w.color+';':'';
      row.innerHTML=
        '<span class="mark" style="'+markStyle+'"><i class="ti ti-check" aria-hidden="true"></i></span>'+
        '<span class="label">'+w.name+'</span>'+
        '<span class="mins">'+Math.round(r.mins)+' min</span>';
      row.setAttribute('aria-pressed',r.done?'true':'false');
      row.addEventListener('click',()=>toggle(w.id,idx));
      group.appendChild(row);
    });

    const add=document.createElement('button');
    add.className='add-row';
    add.innerHTML=
      '<span class="mark-ghost"><i class="ti ti-plus" aria-hidden="true"></i></span>'+
      '<span class="add-label">add another</span>';
    add.addEventListener('click',()=>addAnother(w.id));
    group.appendChild(add);

    const prog=document.createElement('div');
    prog.className='group-progress';
    prog.textContent=doneCount+' of '+w.goal;
    group.appendChild(prog);

    plan.appendChild(group);
  });
}

function toggle(id,idx){
  sessions[id][idx].done=!sessions[id][idx].done;
  renderHeadline();
  renderWeekBar();
  renderPlan();
  renderMonth();
}

function addAnother(id){
  const w=workouts.find(x=>x.id===id);
  sessions[id].push({done:true,mins:w.dur});
  renderHeadline();
  renderWeekBar();
  renderPlan();
  renderMonth();
}

const priorTotals={1:2,2:1,3:2,4:1,5:0,6:3,7:0,8:1,9:2,10:0,11:2,12:1,13:2,14:0};

function tint(v){
  if(v>=3) return '#378ADD';
  if(v===2) return '#85B7EB';
  if(v===1) return '#E6F1FB';
  return 'var(--color-background-secondary)';
}

function renderMonth(){
  const grid=document.getElementById('month-grid');
  grid.innerHTML='';
  const todayCounts={};
  workouts.forEach(w=>{todayCounts[w.id]=sessions[w.id].filter(r=>r.done).length;});

  for(let day=1;day<=30;day++){
    let vol=0;
    let future=false;
    if(day<=14){
      vol=priorTotals[day]||0;
    }else if(day<=20){
      const map={
        15:todayCounts.tonal1,
        16:todayCounts.tonal2,
        17:todayCounts.pilates,
        18:Math.max(0,todayCounts.hills-1),
        19:todayCounts.hills>=2?1:0,
        20:0
      };
      vol=map[day]||0;
    }else{
      future=true;
    }
    const cell=document.createElement('div');
    cell.className='cell'+(future?' future':'')+(day===20?' today':'');
    if(!future){cell.style.background=tint(vol);}
    cell.title='Jun '+day;
    grid.appendChild(cell);
  }
}

renderHeadline();
renderWeekBar();
renderPlan();
renderMonth();
</script>
</body>
</html>
