<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Workout tracker · Gauge</title>
<meta name="description" content="A calm, non-dopamine weekly workout tracker. A semicircular gauge shows how far through the week you are; tap a workout to log it.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f3f1ec;
  --color-background-tertiary:#edebe4;
  --color-background-info:#E6F1FB;
  --color-text-primary:#1f1f1d;
  --color-text-secondary:#6b6a64;
  --color-text-tertiary:#a09f97;
  --color-text-info:#0C447C;
  --color-border-tertiary:rgba(20,20,15,0.12);
  --color-border-secondary:rgba(20,20,15,0.20);
  --color-border-info:#378ADD;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
*{box-sizing:border-box;}
body{
  margin:0;padding:28px 16px 48px;
  background:var(--color-background-tertiary);
  color:var(--color-text-primary);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.page-head{text-align:center;max-width:680px;margin:0 auto 24px;}
.page-head h1{font-size:22px;font-weight:500;margin:0 0 4px;}
.page-head p{font-size:14px;color:var(--color-text-secondary);margin:0;line-height:1.6;}
.wt-phone{width:min(340px,100%);margin:0 auto;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:26px;padding:20px 18px;}
.wt-week-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.wt-week-head .label{font-size:13px;color:var(--color-text-secondary);}
.wt-week-head .dates{font-size:13px;color:var(--color-text-tertiary);}

.wt-gauge-wrap{text-align:center;margin:4px 0 2px;}
.wt-gauge-svg{display:block;width:240px;max-width:100%;height:auto;margin:0 auto;}
.wt-arc-fill{
  fill:none;stroke:#378ADD;stroke-width:14;stroke-linecap:round;
  transition:stroke-dashoffset 0.9s cubic-bezier(.22,.61,.36,1);
}
.wt-arc-track{fill:none;stroke:var(--color-border-tertiary);stroke-width:14;stroke-linecap:round;}
.wt-tick{stroke:#378ADD;stroke-width:2;transition:transform 0.9s cubic-bezier(.22,.61,.36,1);transform-origin:120px 120px;}
.wt-pct{font-size:40px;font-weight:500;line-height:1;margin-top:-44px;}
.wt-sessions{font-size:14px;color:var(--color-text-secondary);margin-top:6px;}
.wt-left{font-size:13px;color:var(--color-text-tertiary);margin-top:3px;}

.wt-section-label{font-size:12px;color:var(--color-text-secondary);margin:22px 0 10px;}
.wt-break-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
.wt-pip{width:10px;height:10px;border-radius:50%;display:inline-block;flex:0 0 auto;}
.wt-break-name{font-size:14px;flex:0 0 auto;width:62px;}
.wt-minibar{flex:1;height:5px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;}
.wt-minibar > span{display:block;height:100%;border-radius:3px;transition:width 0.5s ease;}
.wt-break-count{font-size:13px;color:var(--color-text-secondary);flex:0 0 auto;min-width:34px;text-align:right;}
.wt-break-count .over{color:var(--color-text-tertiary);}

.wt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.wt-tile{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 8px 9px;cursor:pointer;background:var(--color-background-primary);text-align:center;position:relative;transition:background .12s,transform .06s;font-family:inherit;color:inherit;}
.wt-tile:hover{background:var(--color-background-secondary);}
.wt-tile:active{transform:scale(0.96);}
.wt-tile i{font-size:19px;}
.wt-tile .tname{font-size:12px;font-weight:500;margin-top:5px;}
.wt-tile .tdur{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;}
.wt-tile-badge{position:absolute;top:6px;right:7px;color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:500;}

.wt-today-list .row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:0.5px solid var(--color-border-tertiary);}
.wt-today-list .row .lbl{font-size:14px;flex:1;}
.wt-today-list .row .min{font-size:13px;color:var(--color-text-secondary);}
.wt-today-empty{font-size:13px;color:var(--color-text-tertiary);padding:4px 0;}
.wt-today-total{font-size:12px;color:var(--color-text-tertiary);text-align:right;padding-top:7px;}
.page-foot{text-align:center;font-size:12px;color:var(--color-text-tertiary);margin:32px auto 0;max-width:680px;line-height:1.6;}
</style>
</head>
<body>
<header class="page-head">
  <h1>Workout tracker</h1>
  <p>Gauge · how far through the week</p>
</header>

<div class="wt-phone">
  <div class="wt-week-head">
    <span class="label">This week</span>
    <span class="dates">Jun 15 – 21</span>
  </div>

  <div class="wt-gauge-wrap">
    <svg class="wt-gauge-svg" viewBox="0 0 240 134" role="img" aria-label="Week completion gauge">
      <!-- semicircle: center (120,120), radius 100, from 180deg (left) to 0deg (right) -->
      <path class="wt-arc-track" d="M 20 120 A 100 100 0 0 1 220 120"></path>
      <path id="arcFill" class="wt-arc-fill" d="M 20 120 A 100 100 0 0 1 220 120"></path>
      <line id="arcTick" class="wt-tick" x1="20" y1="120" x2="34" y2="120"></line>
    </svg>
    <div id="gaugePct" class="wt-pct">0%</div>
    <div id="gaugeSessions" class="wt-sessions">0 of 0 sessions</div>
    <div id="gaugeLeft" class="wt-left">0 left this week</div>
  </div>

  <div class="wt-section-label">What's behind it</div>
  <div id="breakdown"></div>

  <div class="wt-section-label">Tap to log today</div>
  <div id="grid" class="wt-grid"></div>

  <div class="wt-section-label">Today · Sat Jun 20</div>
  <div id="todayLog" class="wt-today-list"></div>
</div>

<p class="page-foot">An early design mockup — the numbers are sample data and reset on refresh.</p>

<script>
const TODAY = 5; // Sat Jun 20
const workouts = {
  tonal1:{name:'Tonal · Workout 1', short:'Tonal 1', color:'#378ADD', dur:15, goal:2, icon:'ti-bolt'},
  tonal2:{name:'Tonal · Workout 2', short:'Tonal 2', color:'#185FA5', dur:15, goal:2, icon:'ti-bolt'},
  pilates:{name:'Pilates', short:'Pilates', color:'#1D9E75', dur:25, goal:3, icon:'ti-yoga'},
  hills:{name:'Hills', short:'Hills', color:'#BA7517', dur:40, goal:4, icon:'ti-mountain'}
};
const order = ['tonal1','tonal2','pilates','hills'];

// Prefilled week so today's totals match: tonal1 1/2, tonal2 1/2, pilates 2/3, hills 3/4
const week = {
  0:[{wid:'hills',label:'Hills',min:40}],
  1:[{wid:'pilates',label:'Pilates',min:25},{wid:'tonal1',label:'Tonal · Workout 1',min:15}],
  2:[{wid:'tonal2',label:'Tonal · Workout 2',min:15},{wid:'hills',label:'Hills',min:38}],
  3:[{wid:'pilates',label:'Pilates',min:25},{wid:'hills',label:'Hills',min:45}],
  4:[],5:[],6:[]
};

// Geometry of the semicircle gauge.
const R = 100, CX = 120, CY = 120;
const ARC_LEN = Math.PI * R; // length of 180deg arc

function countFor(wid){let n=0;for(let d=0;d<7;d++)n+=week[d].filter(e=>e.wid===wid).length;return n;}

function aggregate(){
  let target=0, done=0, over=0;
  order.forEach(id=>{
    const w=workouts[id], c=countFor(id);
    target+=w.goal;
    done+=Math.min(c,w.goal);
    over+=Math.max(0,c-w.goal);
  });
  const pct=Math.round(done/target*100);
  const left=Math.max(0,target-done);
  return {target,done,over,pct,left};
}

function renderGauge(){
  const a=aggregate();
  const frac=Math.min(1,a.done/a.target);
  const fill=document.getElementById('arcFill');
  // Draw from the left end: dasharray spans full arc, offset hides the remainder.
  fill.style.strokeDasharray=ARC_LEN+' '+ARC_LEN;
  fill.style.strokeDashoffset=ARC_LEN*(1-frac);
  // Subtle tick at the end of the filled arc.
  const angle=180-(180*frac); // degrees, 180 (left) -> 0 (right)
  const tick=document.getElementById('arcTick');
  tick.style.transform='rotate('+(-180*frac)+'deg)';

  document.getElementById('gaugePct').textContent=a.pct+'%';
  document.getElementById('gaugeSessions').textContent=a.done+' of '+a.target+' sessions';
  let leftTxt = a.left===0 ? 'All caught up for the week' : a.left+' left this week';
  if(a.over>0) leftTxt += '  ·  +'+a.over+' extra';
  document.getElementById('gaugeLeft').textContent=leftTxt;
}

function renderBreakdown(){
  const box=document.getElementById('breakdown');box.innerHTML='';
  order.forEach(id=>{
    const w=workouts[id], c=countFor(id);
    const filled=Math.min(c,w.goal), over=Math.max(0,c-w.goal);
    const row=document.createElement('div');row.className='wt-break-row';
    const pct=Math.round(filled/w.goal*100);
    let countHtml='<span class="wt-break-count">'+c+'/'+w.goal;
    if(over>0) countHtml+=' <span class="over">+'+over+'</span>';
    countHtml+='</span>';
    row.innerHTML=
      '<span class="wt-pip" style="background:'+w.color+';"></span>'+
      '<span class="wt-break-name">'+w.short+'</span>'+
      '<span class="wt-minibar"><span style="width:'+pct+'%;background:'+w.color+';"></span></span>'+
      countHtml;
    box.appendChild(row);
  });
}

function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  order.forEach(id=>{
    const w=workouts[id], todayN=week[TODAY].filter(e=>e.wid===id).length;
    const t=document.createElement('button');t.className='wt-tile';
    t.onclick=()=>logWorkout(id);
    const badge= todayN>0 ? '<span class="wt-tile-badge" style="background:'+w.color+';">'+todayN+'</span>':'';
    t.innerHTML=badge+
      '<i class="ti '+w.icon+'" aria-hidden="true" style="color:'+w.color+';"></i>'+
      '<div class="tname">'+w.short+'</div>'+
      '<div class="tdur">'+w.dur+' min</div>';
    grid.appendChild(t);
  });
  const cust=document.createElement('button');cust.className='wt-tile';
  cust.onclick=()=>logWorkout('hills','City walk',22);
  cust.innerHTML='<i class="ti ti-plus" aria-hidden="true" style="color:var(--color-text-secondary);"></i>'+
    '<div class="tname">Custom</div>'+
    '<div class="tdur">your own</div>';
  grid.appendChild(cust);
  const edit=document.createElement('button');edit.className='wt-tile';
  edit.onclick=()=>alert('Down the road: rename workouts and change goals here.');
  edit.innerHTML='<i class="ti ti-adjustments" aria-hidden="true" style="color:var(--color-text-secondary);"></i>'+
    '<div class="tname">Edit</div>'+
    '<div class="tdur">types &amp; goals</div>';
  grid.appendChild(edit);
}

function renderTodayLog(){
  const box=document.getElementById('todayLog');
  const entries=week[TODAY];
  if(entries.length===0){
    box.innerHTML='<div class="wt-today-empty">Nothing logged yet — it\'s Saturday.</div>';return;
  }
  let total=entries.reduce((a,e)=>a+e.min,0), rows='';
  entries.forEach(e=>{
    rows+='<div class="row">'+
      '<span class="wt-pip" style="background:'+workouts[e.wid].color+';"></span>'+
      '<span class="lbl">'+e.label+'</span>'+
      '<span class="min">'+e.min+' min</span></div>';
  });
  box.innerHTML=rows+'<div class="wt-today-total">'+total+' min today</div>';
}

function logWorkout(wid,label,min){
  const w=workouts[wid];
  week[TODAY].push({wid:wid,label:label||w.name,min:min||w.dur});
  renderAll();
}

function renderAll(){renderGauge();renderBreakdown();renderGrid();renderTodayLog();}
renderAll();
</script>
</body>
</html>
